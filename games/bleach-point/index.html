// ---- LOAD/SAVE ----
function loadProgress(){

      levelMedals = d.medals || levelMedals;

}

      scores: levelScores,

// ---- AUDIO ENGINE ----
function initAudio(){
  if(audioStarted) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  audioStarted = true;
  startAmbient();
}
function startAmbient(){
  if(!audioCtx) return;
  ambientOsc = audioCtx.createOscillator();
  ambientGain = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 200;
  filter.Q.value = 5;
  ambientOsc.type = 'sawtooth';
  ambientOsc.frequency.value = 55;
  ambientGain.gain.value = 0.04;
  ambientOsc.connect(filter);
  filter.connect(ambientGain);
  ambientGain.connect(audioCtx.destination);
  ambientOsc.start();
  const lfo = audioCtx.createOscillator();
  const lfoGain = audioCtx.createGain();
  lfo.frequency.value = 0.15;
  lfoGain.gain.value = 15;
  lfo.connect(lfoGain);
  lfoGain.connect(filter.frequency);
  lfo.start();
}
function playSound(type){
  if(!audioCtx) return;
  const now = audioCtx.currentTime;
  switch(type){
    case 'bubble': {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(800+Math.random()*400, now);
      o.frequency.exponentialRampToValueAtTime(1200+Math.random()*300, now+0.1);
      g.gain.setValueAtTime(0.06, now);
      g.gain.exponentialRampToValueAtTime(0.001, now+0.15);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(now); o.stop(now+0.15);
      break;
    }
    case 'cool': {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(600, now);
      o.frequency.linearRampToValueAtTime(300, now+0.4);
      g.gain.setValueAtTime(0.08, now);
      g.gain.linearRampToValueAtTime(0, now+0.5);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(now); o.stop(now+0.5);
      break;
    }
    case 'heal': {
      for(let i=0;i<3;i++){
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = 'sine';
        o.frequency.value = [523,659,784][i];
        g.gain.setValueAtTime(0, now+i*0.12);
        g.gain.linearRampToValueAtTime(0.07, now+i*0.12+0.05);
        g.gain.linearRampToValueAtTime(0, now+i*0.12+0.3);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(now+i*0.12); o.stop(now+i*0.12+0.35);
      }
      break;
    }
    case 'warning': {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'square';
      o.frequency.value = 220;
      g.gain.setValueAtTime(0.06, now);
      g.gain.setValueAtTime(0, now+0.15);
      g.gain.setValueAtTime(0.06, now+0.2);
      g.gain.setValueAtTime(0, now+0.35);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(now); o.stop(now+0.4);
      break;
    }
    case 'crumble': {
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*0.3, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for(let i=0;i<data.length;i++) data[i] = (Math.random()*2-1)*Math.exp(-i/(data.length*0.3))*0.1;
      const src = audioCtx.createBufferSource();
      const f = audioCtx.createBiquadFilter();
      f.type = 'lowpass'; f.frequency.value = 600;
      src.buffer = buf;
      src.connect(f); f.connect(audioCtx.destination);
      src.start(now);
      break;
    }
    case 'click': {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sine'; o.frequency.value = 1000;
      g.gain.setValueAtTime(0.05, now);
      g.gain.exponentialRampToValueAtTime(0.001, now+0.05);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(now); o.stop(now+0.06);
      break;
    }
    case 'success': {
      [523,659,784,1047].forEach((f,i)=>{
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = 'sine'; o.frequency.value = f;
        g.gain.setValueAtTime(0, now+i*0.15);
        g.gain.linearRampToValueAtTime(0.08, now+i*0.15+0.05);
        g.gain.linearRampToValueAtTime(0, now+i*0.15+0.4);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(now+i*0.15); o.stop(now+i*0.15+0.45);
      });
      break;
    }
    case 'fail': {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(300, now);
      o.frequency.linearRampToValueAtTime(80, now+0.6);
      g.gain.setValueAtTime(0.06, now);
      g.gain.linearRampToValueAtTime(0, now+0.7);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(now); o.stop(now+0.7);
      break;
    }
    case 'fish': {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(1200+Math.random()*600, now);
      o.frequency.exponentialRampToValueAtTime(800, now+0.08);
      g.gain.setValueAtTime(0.03, now);
      g.gain.exponentialRampToValueAtTime(0.001, now+0.1);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(now); o.stop(now+0.1);
      break;
    }
  }
}

  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + 'px';

}
window.addEventListener('resize', resize);
resize();

// ---- UTILITY ----
function lerp(a,b,t){return a+(b-a)*t;}
function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v));}
function dist(x1,y1,x2,y2){return Math.sqrt((x2-x1)**2+(y2-y1)**2);}
function rand(a,b){return a+Math.random()*(b-a);}
function randInt(a,b){return Math.floor(rand(a,b+1));}
function rgba(r,g,b,a){return `rgba(${r|0},${g|0},${b|0},${a})`;}
function rgb(r,g,b){return `rgb(${r|0},${g|0},${b|0})`;}
function hexToRgb(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return[r,g,b];}
function pointInRect(px,py,x,y,w,h){return px>=x&&px<=x+w&&py>=y&&py<=y+h;}

// ---- BUTTON SYSTEM ----
function makeButton(x,y,w,h,text,color,action,fontSize){
  return {x,y,w,h,text,color,action,fontSize:fontSize||16,hovered:false};
}
function drawButton(b){
  const hover = pointInRect(mouseX,mouseY,b.x,b.y,b.w,b.h);
  b.hovered = hover;
  const bc = hexToRgb(b.color);
  ctx.fillStyle = hover ? rgba(bc[0],bc[1],bc[2],0.95) : rgba(bc[0],bc[1],bc[2],0.75);
  ctx.strokeStyle = hover ? '#fff' : rgba(255,255,255,0.5);
  ctx.lineWidth = 2;
  roundRect(ctx,b.x,b.y,b.w,b.h,8);
  ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${b.fontSize}px 'Segoe UI',Arial,sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(b.text, b.x+b.w/2, b.y+b.h/2);
}
function roundRect(c,x,y,w,h,r){
  c.beginPath();
  c.moveTo(x+r,y);
  c.lineTo(x+w-r,y);
  c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r);
  c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h);
  c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r);
  c.quadraticCurveTo(x,y,x+r,y);
  c.closePath();
}

// ---- PARTICLE SYSTEM ----
function spawnParticle(type,x,y,props){
  if(particles.length >= MAX_PARTICLES) {
    const idx = particles.findIndex(p => p.life <= 0);
    if(idx >= 0) particles.splice(idx, 1);
    else return;
  }
  const p = {type,x,y,vx:0,vy:0,life:1,maxLife:1,size:3,color:'#fff',alpha:1,...props};
  p.maxLife = p.life;
  particles.push(p);
  return p;
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt / p.maxLife;
    if(p.type === 'bubble'){
      p.x += Math.sin(gameTime*3+p.phase)*0.3;
      p.vy = -20 - p.speed;
    } else if(p.type === 'zoox_flee'){
      p.vy -= 8*dt;
      p.vx += (Math.random()-0.5)*40*dt;
    } else if(p.type === 'debris'){
      p.vy += 30*dt;
      p.vx *= 0.98;
    } else if(p.type === 'current'){
      p.size *= 0.97;
    } else if(p.type === 'light'){
      p.alpha = 0.1 + 0.05*Math.sin(gameTime+p.phase);
    }
    if(p.life <= 0) particles.splice(i,1);
  }
}
function drawParticles(){
  for(const p of particles){
    const a = clamp(p.life, 0, 1) * (p.alpha||1);
    if(a <= 0) continue;
    ctx.globalAlpha = a;
    if(p.type === 'light'){
      drawLightRay(p);
    } else if(p.type === 'zoox_inside'){
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      ctx.fill();
    } else if(p.type === 'current'){
      ctx.strokeStyle = p.color;
      ctx.lineWidth = p.size;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius||10, 0, Math.PI*2);
      ctx.stroke();
    } else {
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}
function drawLightRay(p){
  const grad = ctx.createLinearGradient(p.x, 0, p.x + p.width, H*0.7);
  grad.addColorStop(0, rgba(255,255,200,0.12*p.alpha));
  grad.addColorStop(1, rgba(255,255,200,0));
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(p.x, 0);
  ctx.lineTo(p.x + p.width, 0);
  ctx.lineTo(p.x + p.width*1.5, H*0.7);
  ctx.lineTo(p.x - p.width*0.5, H*0.7);
  ctx.closePath();
  ctx.fill();
}

// ---- CORAL CLASS ----
function createCoral(x, y, typeIdx){
  const t = CORAL_TYPES[typeIdx % CORAL_TYPES.length];
  return {
    x, y,
    type: t,
    typeIdx: typeIdx % CORAL_TYPES.length,
    health: 100,
    zooxPop: 100,
    zooxMax: 100,
    tempTolerance: t.tolerance,
    stressLevel: 0,
    bleachLevel: 0,
    dead: false,
    shadeTimer: 0,
    feedTimer: 0,
    coolTimer: 0,
    width: rand(50,80),
    height: rand(40,65),
    zooxDots: [],
    deathAnim: 0,
    selected: false
  };
}
function initCoralZoox(c){
  c.zooxDots = [];
  const count = Math.floor(c.zooxMax * 0.8);
  for(let i=0;i<count;i++){
    c.zooxDots.push({
      ox: rand(-c.width*0.4, c.width*0.4),
      oy: rand(-c.height*0.4, c.height*0.4),
      phase: rand(0, Math.PI*2),
      speed: rand(0.5, 2),
      size: rand(1.5, 3)
    });
  }
}
function getCoralColor(c){
  const bc = c.type.baseColor;
  const bleach = c.bleachLevel / 100;
  const dead = c.dead ? 0.7 : 0;
  let r = lerp(bc[0], 250, bleach);
  let g = lerp(bc[1], 248, bleach);
  let b = lerp(bc[2], 241, bleach);
  if(c.dead){
    r = lerp(r, 158, dead);
    g = lerp(g, 158, dead);
    b = lerp(b, 158, dead);
  }
  return [r,g,b];
}

function drawCoral(c, idx){
  const col = getCoralColor(c);
  const cx = c.x, cy = c.y;
  const hw = c.width/2, hh = c.height/2;
  const sel = (selectedCoral === idx);
  const hov = (hoveredCoral === idx);

  ctx.save();
  ctx.translate(cx, cy);

  // Shadow
  ctx.fillStyle = rgba(0,0,0,0.2);
  ctx.beginPath();
  ctx.ellipse(0, hh+4, hw*0.8, 6, 0, 0, Math.PI*2);
  ctx.fill();

  // Coral body based on shape
  ctx.fillStyle = rgb(col[0],col[1],col[2]);
  ctx.strokeStyle = rgba(col[0]*0.7,col[1]*0.7,col[2]*0.7,0.6);
  ctx.lineWidth = 2;

  switch(c.type.shape){
    case 'branch':
      drawBranchCoral(c, hw, hh, col);
      break;
    case 'dome':
      drawDomeCoral(c, hw, hh, col);
      break;
    case 'table':
      drawTableCoral(c, hw, hh, col);
      break;
    case 'fan':
      drawFanCoral(c, hw, hh, col);
      break;
    case 'pillar':
      drawPillarCoral(c, hw, hh, col);
      break;
    case 'fire':
      drawFireCoral(c, hw, hh, col);
      break;
    case 'star':
      drawStarCoral(c, hw, hh, col);
      break;
    case 'finger':
      drawFingerCoral(c, hw, hh, col);
      break;
    default:
      ctx.beginPath();
      ctx.ellipse(0, 0, hw, hh, 0, 0, Math.PI*2);
      ctx.fill(); ctx.stroke();
  }

  // Zooxanthellae dots inside coral
  if(!c.dead){
    const zooxColor = rgba(col[0]*0.8+50, col[1]*0.8+50, col[2]*0.4, 0.9);
    for(const d of c.zooxDots){
      const dx = d.ox + Math.sin(gameTime*d.speed+d.phase)*3;
      const dy = d.oy + Math.cos(gameTime*d.speed*0.7+d.phase)*2;
      ctx.fillStyle = zooxColor;
      ctx.beginPath();
      ctx.arc(dx, dy, d.size, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // Death cracks
  if(c.dead){
    ctx.strokeStyle = rgba(80,80,80,0.5);
    ctx.lineWidth = 1.5;
    for(let i=0;i<3;i++){
      ctx.beginPath();
      ctx.moveTo(rand(-hw*0.6,hw*0.3), rand(-hh*0.3,0));
      ctx.lineTo(rand(-hw*0.2,hw*0.6), rand(0,hh*0.4));
      ctx.stroke();
    }
  }

  // Selection ring
  if(sel || hov){
    ctx.strokeStyle = sel ? '#FFD700' : 'rgba(255,255,255,0.5)';
    ctx.lineWidth = sel ? 3 : 2;
    ctx.setLineDash(sel ? [6,4] : [4,4]);
    ctx.beginPath();
    ctx.ellipse(0, 0, hw+8, hh+8, 0, 0, Math.PI*2);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Shade cover visual
  if(c.shadeTimer > 0){
    ctx.fillStyle = rgba(60,40,20,0.25);
    ctx.fillRect(-hw-10, -hh-25, c.width+20, 10);
  }

  // Cool current visual
  if(c.coolTimer > 0){
    ctx.strokeStyle = rgba(33,150,243,0.3+0.2*Math.sin(gameTime*4));
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(0, 0, hw+15+Math.sin(gameTime*3)*5, 0, Math.PI*2);
    ctx.stroke();
  }

  ctx.restore();

  // Health bar above coral
  if(!c.dead){
    const barW = 50, barH = 5;
    const barX = cx - barW/2, barY = cy - hh - 18;
    ctx.fillStyle = rgba(0,0,0,0.4);
    roundRect(ctx, barX-1, barY-1, barW+2, barH+2, 2);
    ctx.fill();
    const healthPct = c.health / 100;
    const hCol = healthPct > 0.6 ? '#4CAF50' : healthPct > 0.3 ? '#FF9800' : '#F44336';
    ctx.fillStyle = hCol;
    roundRect(ctx, barX, barY, barW*healthPct, barH, 2);
    ctx.fill();
  }
}

function drawBranchCoral(c, hw, hh, col){
  for(let i=-2;i<=2;i++){
    const bx = i * hw*0.35;
    const bh = hh*(0.7+Math.abs(i)*0.15);
    ctx.fillStyle = rgb(col[0]-i*5,col[1]-i*3,col[2]+i*5);
    ctx.beginPath();
    ctx.moveTo(bx-4, hh*0.3);
    ctx.lineTo(bx-6-Math.abs(i)*2, -bh);
    ctx.lineTo(bx+6+Math.abs(i)*2, -bh);
    ctx.lineTo(bx+4, hh*0.3);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    // Tips
    ctx.beginPath();
    ctx.arc(bx, -bh, 4+Math.abs(i), 0, Math.PI*2);
    ctx.fill();
  }
}
function drawDomeCoral(c, hw, hh, col){
  ctx.beginPath();
  ctx.ellipse(0, hh*0.15, hw, hh*0.85, 0, Math.PI, Math.PI*2);
  ctx.lineTo(hw, hh*0.3);
  ctx.ellipse(0, hh*0.3, hw, hh*0.2, 0, 0, Math.PI);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // Brain ridges
  ctx.strokeStyle = rgba(col[0]*0.6,col[1]*0.6,col[2]*0.6,0.4);
  ctx.lineWidth = 1;
  for(let i=-3;i<=3;i++){
    ctx.beginPath();
    ctx.moveTo(i*hw*0.2, -hh*0.3+Math.abs(i)*5);
    ctx.quadraticCurveTo(i*hw*0.3, -hh*0.1, i*hw*0.15, hh*0.1);
    ctx.stroke();
  }
}
function drawTableCoral(c, hw, hh, col){
  // Stem
  ctx.fillStyle = rgb(col[0]*0.8,col[1]*0.8,col[2]*0.8);
  ctx.fillRect(-6, -hh*0.2, 12, hh*0.7);
  // Table top
  ctx.fillStyle = rgb(col[0],col[1],col[2]);
  ctx.beginPath();
  ctx.ellipse(0, -hh*0.2, hw, hh*0.3, 0, 0, Math.PI*2);
  ctx.fill(); ctx.stroke();
}
function drawFanCoral(c, hw, hh, col){
  ctx.beginPath();
  ctx.moveTo(0, hh*0.3);
  ctx.quadraticCurveTo(-hw*1.1, -hh*0.2, -hw*0.6, -hh);
  ctx.quadraticCurveTo(0, -hh*1.1, hw*0.6, -hh);
  ctx.quadraticCurveTo(hw*1.1, -hh*0.2, 0, hh*0.3);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // Veins
  ctx.strokeStyle = rgba(col[0]*0.7,col[1]*0.7,col[2]*0.7,0.3);
  for(let a=-0.6;a<=0.6;a+=0.3){
    ctx.beginPath();
    ctx.moveTo(0, hh*0.2);
    ctx.quadraticCurveTo(a*hw, -hh*0.3, a*hw*1.2, -hh*0.8);
    ctx.stroke();
  }
}
function drawPillarCoral(c, hw, hh, col){
  for(let i=-1;i<=1;i++){
    const px = i*hw*0.4;
    const ph = hh*(1+Math.abs(i)*0.2);
    ctx.fillStyle = rgb(col[0]+i*10,col[1]+i*5,col[2]-i*10);
    roundRect(ctx, px-8, -ph, 16, ph+hh*0.3, 6);
    ctx.fill(); ctx.stroke();
  }
}
function drawFireCoral(c, hw, hh, col){
  ctx.beginPath();
  ctx.moveTo(-hw*0.8, hh*0.3);
  for(let i=0;i<=8;i++){
    const t = i/8;
    const x = lerp(-hw*0.8, hw*0.8, t);
    const y = -hh*(0.5+0.5*Math.sin(t*Math.PI))+Math.sin(t*12)*5;
    ctx.lineTo(x, y);
  }
  ctx.lineTo(hw*0.8, hh*0.3);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
}
function drawStarCoral(c, hw, hh, col){
  ctx.beginPath();
  ctx.ellipse(0, 0, hw*0.85, hh*0.85, 0, 0, Math.PI*2);
  ctx.fill(); ctx.stroke();
  // Star polyps
  ctx.fillStyle = rgba(col[0]+40,col[1]+40,col[2]+40,0.6);
  for(let i=0;i<8;i++){
    const a = i*Math.PI/4;
    const r = hw*0.55;
    const sx = Math.cos(a)*r, sy = Math.sin(a)*r*0.8;
    ctx.beginPath();
    for(let j=0;j<6;j++){
      const pa = j*Math.PI/3;
      const pr = 5;
      ctx.lineTo(sx+Math.cos(pa)*pr, sy+Math.sin(pa)*pr);
    }
    ctx.closePath();
    ctx.fill();
  }
}
function drawFingerCoral(c, hw, hh, col){
  for(let i=0;i<5;i++){
    const fx = (i-2)*hw*0.3;
    const fh = hh*(0.6+i%2*0.4);
    ctx.fillStyle = rgb(col[0]+i*5,col[1]-i*3,col[2]+i*8);
    ctx.beginPath();
    ctx.moveTo(fx-5, hh*0.3);
    ctx.quadraticCurveTo(fx-7, -fh*0.5, fx, -fh);
    ctx.quadraticCurveTo(fx+7, -fh*0.5, fx+5, hh*0.3);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
  }
}

// ---- FISH ----
function createFish(bounds){
  const t = FISH_TYPES[randInt(0, FISH_TYPES.length-1)];
  return {
    type: t,
    x: rand(bounds.x, bounds.x+bounds.w),
    y: rand(bounds.y, bounds.y+bounds.h),
    vx: (Math.random()>0.5?1:-1)*t.speed*30,
    phase: rand(0, Math.PI*2),
    amp: rand(10,30),
    baseY: 0,
    alive: true
  };
}
function drawFish(f){
  const dir = f.vx > 0 ? 1 : -1;
  const s = f.type.size;
  ctx.save();
  ctx.translate(f.x, f.y);
  ctx.scale(dir, 1);

  if(f.type.turtle){
    // Sea turtle drawing
    // Shell
    ctx.fillStyle = f.type.color;
    ctx.beginPath();
    ctx.ellipse(0, 0, s*0.7, s*0.5, 0, 0, Math.PI*2);
    ctx.fill();
    // Shell pattern
    ctx.strokeStyle = '#1B5E20';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.ellipse(0, 0, s*0.45, s*0.3, 0, 0, Math.PI*2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-s*0.2, -s*0.45);
    ctx.lineTo(-s*0.1, s*0.45);
    ctx.moveTo(s*0.2, -s*0.45);
    ctx.lineTo(s*0.1, s*0.45);
    ctx.stroke();
    // Head
    ctx.fillStyle = '#66BB6A';
    ctx.beginPath();
    ctx.ellipse(s*0.8, 0, s*0.25, s*0.18, 0, 0, Math.PI*2);
    ctx.fill();
    // Eye
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(s*0.9, -s*0.06, s*0.05, 0, Math.PI*2);
    ctx.fill();
    // Flippers
    ctx.fillStyle = '#4CAF50';
    // Front flippers
    ctx.beginPath();
    ctx.moveTo(s*0.3, -s*0.35);
    ctx.quadraticCurveTo(s*0.8, -s*0.8, s*0.5, -s*0.35);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(s*0.3, s*0.35);
    ctx.quadraticCurveTo(s*0.8, s*0.8, s*0.5, s*0.35);
    ctx.closePath();
    ctx.fill();
    // Back flippers
    ctx.beginPath();
    ctx.moveTo(-s*0.4, -s*0.25);
    ctx.quadraticCurveTo(-s*0.7, -s*0.55, -s*0.55, -s*0.2);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-s*0.4, s*0.25);
    ctx.quadraticCurveTo(-s*0.7, s*0.55, -s*0.55, s*0.2);
    ctx.closePath();
    ctx.fill();
  } else {
    // Regular fish drawing
    ctx.fillStyle = f.type.color;
    ctx.beginPath();
    ctx.moveTo(s, 0);
    ctx.quadraticCurveTo(s*0.5, -s*0.6, -s*0.3, -s*0.3);
    ctx.lineTo(-s, 0);
    ctx.lineTo(-s*0.3, s*0.3);
    ctx.quadraticCurveTo(s*0.5, s*0.6, s, 0);
    ctx.closePath();
    ctx.fill();
    // Tail
    ctx.beginPath();
    ctx.moveTo(-s*0.3, -s*0.2);
    ctx.lineTo(-s*1.1, -s*0.5);
    ctx.lineTo(-s*1.1, s*0.5);
    ctx.lineTo(-s*0.3, s*0.2);
    ctx.closePath();
    ctx.fill();
    // Eye
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s*0.4, -s*0.1, s*0.15, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(s*0.45, -s*0.1, s*0.08, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

// ---- INIT LEVEL ----
function initLevel(lvlIdx){
  currentLevel = lvlIdx;
  const lvl = LEVELS[lvlIdx];
  oceanTemp = lvl.tempBase;
  oceanPH = lvl.phBase;
  energy = 50;
  gameTime = 0;
  levelTimer = 0;
  scoreAccum = 0;
  coralHealthSum = 0;
  coralHealthSamples = 0;
  zooxPopSum = 0;
  zooxPopSamples = 0;
  selectedCoral = -1;
  selectedTool = -1;
  hoveredCoral = -1;
  activeEvent = null;
  eventTimer = 0;
  eventCooldown = 15;
  particles = [];
  notificationText = '';
  notificationTimer = 0;

  // Create corals
  corals = [];
  const numCorals = lvl.corals;
  const reefBaseY = H * 0.72;
  const reefW = W * 0.8;
  const startX = W * 0.1;
  for(let i=0;i<numCorals;i++){
    const x = startX + (i/(numCorals-1)) * reefW;
    const yOff = Math.sin(i*1.3)*20 + rand(-10,10);
    const c = createCoral(x, reefBaseY + yOff, i);
    initCoralZoox(c);
    corals.push(c);
  }

  // Create fish
  fish = [];
  const fishCount = Math.min(numCorals * 3, 24);
  const fishBounds = {x:W*0.05, y:H*0.15, w:W*0.9, h:H*0.5};
  for(let i=0;i<fishCount;i++){
    const f = createFish(fishBounds);
    f.baseY = f.y;
    fish.push(f);
  }

  // Light rays
  for(let i=0;i<5;i++){
    spawnParticle('light', rand(W*0.1, W*0.9), 0, {
      width: rand(30,80),
      phase: rand(0,Math.PI*2),
      life: 99999, maxLife: 99999,
      alpha: 0.08
    });
  }

  state = STATES.PLAYING;
}

// ---- UPDATE FUNCTIONS ----
function updatePlaying(dt){
  gameTime += dt;
  levelTimer += dt;
  lightRayAngle += dt * 0.1;
  bubbleTimer += dt;
  const lvl = LEVELS[currentLevel];

  // Temperature and pH changes
  let tempDelta = lvl.tempRate * dt;
  let phDelta = -lvl.phRate * dt;
  if(activeEvent){
    if(activeEvent.effect === 'heat') tempDelta += 0.03*dt;
    if(activeEvent.effect === 'cool') tempDelta -= 0.02*dt;
    if(activeEvent.effect === 'storm') tempDelta -= 0.015*dt;
  }
  oceanTemp += tempDelta;
  oceanPH += phDelta;
  oceanTemp = clamp(oceanTemp, 24, 35);
  oceanPH = clamp(oceanPH, 7.0, 8.5);

  // Energy regen from healthy coral
  let healthyCount = 0;
  for(const c of corals) if(!c.dead && c.health > 50) healthyCount++;
  energy = clamp(energy + healthyCount * 0.8 * dt, 0, maxEnergy);

  // Update corals
  let totalHealth = 0;
  let aliveCount = 0;
  let totalZoox = 0;
  for(let i=0;i<corals.length;i++){
    const c = corals[i];
    if(c.dead) continue;
    aliveCount++;

    // Temperature stress
    let effectiveTemp = oceanTemp;
    if(c.coolTimer > 0) effectiveTemp -= 1.5;
    if(c.shadeTimer > 0) effectiveTemp -= 0.8;
    const tempStress = Math.max(0, effectiveTemp - c.tempTolerance) * 8;
    const phStress = Math.max(0, 7.8 - oceanPH) * 20;
    let pollutionStress = 0;
    if(activeEvent && activeEvent.effect === 'pollution') pollutionStress = 15;
    c.stressLevel = clamp(tempStress + phStress + pollutionStress, 0, 100);

    // Zooxanthellae expulsion under stress
    if(c.stressLevel > 20){
      const expelRate = (c.stressLevel - 20) * 0.15 * dt;
      c.zooxPop = Math.max(0, c.zooxPop - expelRate);
      // Visual: zooxanthellae fleeing
      if(Math.random() < c.stressLevel * 0.005 * dt && c.zooxDots.length > 0){
        const dotIdx = randInt(0, c.zooxDots.length-1);
        const dot = c.zooxDots[dotIdx];
        const zCol = getCoralColor(c);
        spawnParticle('zoox_flee', c.x + dot.ox, c.y + dot.oy, {
          vx: rand(-30,30), vy: rand(-40,-10),
          life: 2, size: dot.size,
          color: rgba(zCol[0]*0.8+50,zCol[1]*0.8+50,zCol[2]*0.4,0.9)
        });
        c.zooxDots.splice(dotIdx, 1);
      }
    }

    // Zooxanthellae recovery if low stress
    if(c.stressLevel < 10 && c.zooxPop < c.zooxMax){
      c.zooxPop = Math.min(c.zooxMax, c.zooxPop + 0.5*dt);
      // Add dots back
      if(c.zooxDots.length < c.zooxPop * 0.8 && Math.random() < 0.05){
        c.zooxDots.push({
          ox: rand(-c.width*0.4, c.width*0.4),
          oy: rand(-c.height*0.4, c.height*0.4),
          phase: rand(0, Math.PI*2),
          speed: rand(0.5, 2),
          size: rand(1.5, 3)
        });
      }
    }

    // Bleach level based on zooxanthellae
    c.bleachLevel = lerp(c.bleachLevel, 100 - c.zooxPop, dt * 2);

    // Health based on zoox and stress
    let healthDelta = 0;
    if(c.zooxPop > 60) healthDelta += 3*dt;
    else if(c.zooxPop > 30) healthDelta += 0;
    else if(c.zooxPop > 10) healthDelta -= 5*dt;
    else healthDelta -= 12*dt;

    if(c.feedTimer > 0) healthDelta += 4*dt;
    if(c.stressLevel > 50) healthDelta -= 3*dt;

    // pH weakening
    if(oceanPH < 7.6) healthDelta -= 4*dt;
    else if(oceanPH < 7.8) healthDelta -= 1*dt;

    // Storm damage
    if(activeEvent && activeEvent.effect === 'storm') healthDelta -= 2*dt;

    // Parrotfish cleaning
    if(activeEvent && activeEvent.effect === 'clean') healthDelta += 2*dt;

    c.health = clamp(c.health + healthDelta, 0, 100);

    // Death check
    if(c.health <= 0){
      c.dead = true;
      c.health = 0;
      playSound('crumble');
      // Debris particles
      for(let j=0;j<15;j++){
        spawnParticle('debris', c.x+rand(-20,20), c.y+rand(-20,20), {
          vx: rand(-40,40), vy: rand(-30,10),
          life: 2, size: rand(2,5),
          color: rgba(158,158,158,0.8)
        });
      }
      showNotification(c.type.name + ' coral has died!');
    }

    // Timers
    c.shadeTimer = Math.max(0, c.shadeTimer - dt);
    c.feedTimer = Math.max(0, c.feedTimer - dt);
    c.coolTimer = Math.max(0, c.coolTimer - dt);

    totalHealth += c.health;
    totalZoox += c.zooxPop;
  }

  // Biodiversity: fish count based on reef health
  const avgHealth = aliveCount > 0 ? totalHealth / aliveCount : 0;
  const targetFish = Math.floor((avgHealth / 100) * corals.length * 3);
  biodiversity = fish.filter(f=>f.alive).length;

  // Spawn/despawn fish
  if(biodiversity < targetFish && Math.random() < 0.02){
    const f = createFish({x:W*0.05,y:H*0.15,w:W*0.9,h:H*0.5});
    f.baseY = f.y;
    f.alive = true;
    fish.push(f);
    if(Math.random()<0.1) playSound('fish');
  }
  if(biodiversity > targetFish + 2){
    for(let i=fish.length-1;i>=0;i--){
      if(fish[i].alive){fish[i].alive=false;break;}
    }
  }

  // Update fish
  for(const f of fish){
    if(!f.alive) continue;
    f.x += f.vx * dt;
    f.y = f.baseY + Math.sin(gameTime*1.5+f.phase)*f.amp;
    if(f.x > W+30) {f.x = -30; f.baseY = rand(H*0.15,H*0.6);}
    if(f.x < -30) {f.x = W+30; f.baseY = rand(H*0.15,H*0.6);}
  }

  // Random bubbles
  if(bubbleTimer > 0.3){
    bubbleTimer = 0;
    for(let i=0;i<2;i++){
      spawnParticle('bubble', rand(W*0.05,W*0.95), H+5, {
        vy: -20, life: rand(4,8), size: rand(1,4),
        color: rgba(200,220,255,0.3),
        phase: rand(0,Math.PI*2),
        speed: rand(5,15)
      });
    }
  }

  // Events
  eventCooldown -= dt;
  if(!activeEvent && eventCooldown <= 0 && Math.random() < lvl.eventFreq){
    const ev = EVENTS[randInt(0, EVENTS.length-1)];
    activeEvent = {...ev, remaining: ev.duration};
    eventCooldown = rand(20, 40);
    showNotification('EVENT: ' + ev.name + '!');
    if(ev.effect === 'heat') playSound('warning');
    else if(ev.effect === 'cool') playSound('cool');
  }
  if(activeEvent){
    activeEvent.remaining -= dt;
    if(activeEvent.remaining <= 0) {
      activeEvent = null;
    }
  }

  // Score accumulation
  coralHealthSum += avgHealth * dt;
  coralHealthSamples += dt;
  zooxPopSum += (aliveCount > 0 ? totalZoox / aliveCount : 0) * dt;
  zooxPopSamples += dt;

  // Update particles
  updateParticles(dt);

  // Notification timer
  if(notificationTimer > 0) notificationTimer -= dt;

  // Check level end conditions
  const allDead = corals.every(c => c.dead);
  if(allDead){
    endLevel(false);
    return;
  }
  if(lvl.duration > 0 && levelTimer >= lvl.duration){
    endLevel(true);
    return;
  }
}

function endLevel(survived){
  const avgH = coralHealthSamples > 0 ? coralHealthSum / coralHealthSamples : 0;
  const avgZ = zooxPopSamples > 0 ? zooxPopSum / zooxPopSamples : 0;
  const bioScore = biodiversity * 3;
  const timeBonus = Math.floor(levelTimer / 10);
  const finalScore = Math.floor(avgH * 0.4 + avgZ * 0.3 + bioScore + timeBonus);

  let medal = 0;
  if(finalScore >= MEDAL_THRESHOLDS.gold) medal = 3;
  else if(finalScore >= MEDAL_THRESHOLDS.silver) medal = 2;
  else if(finalScore >= MEDAL_THRESHOLDS.bronze) medal = 1;

  if(finalScore > levelScores[currentLevel]) levelScores[currentLevel] = finalScore;
  if(medal > levelMedals[currentLevel]) levelMedals[currentLevel] = medal;
  if(survived && currentLevel + 1 < LEVELS.length && currentLevel + 1 >= unlockedLevels){
    unlockedLevels = currentLevel + 2;
  }
  saveProgress();

  levelCompleteData = {survived, avgH, avgZ, bioScore, timeBonus, finalScore, medal};

  if(survived){
    state = STATES.LEVEL_COMPLETE;
    playSound('success');
  } else {
    state = STATES.GAME_OVER;
    playSound('fail');
  }
}

// ---- TOOL ACTIONS ----
function applyTool(toolIdx, coralIdx){
  if(toolIdx < 0 || coralIdx < 0) return;
  const tool = TOOLS[toolIdx];
  const c = corals[coralIdx];
  if(!c || c.dead && toolIdx !== 4) return;
  if(energy < tool.cost) {
    showNotification('Not enough energy!');
    return;
  }
  energy -= tool.cost;
  playSound('heal');

  switch(toolIdx){
    case 0: // Cool Current
      c.coolTimer = 15;
      for(let i=0;i<20;i++){
        spawnParticle('current', c.x+rand(-30,30), c.y+rand(-30,30), {
          vx: rand(-20,20), vy: rand(-20,20),
          life: 1.5, size: rand(2,5),
          color: rgba(33,150,243,0.5),
          radius: rand(5,15)
        });
      }
      showNotification('Cool current sent to ' + c.type.name);
      break;
    case 1: // Feed Coral
      c.feedTimer = 20;
      c.health = clamp(c.health + 10, 0, 100);
      showNotification('Fed ' + c.type.name + ' coral');
      break;
    case 2: // Shade Cover
      c.shadeTimer = 25;
      showNotification('Shade deployed over ' + c.type.name);
      break;
    case 3: // Seed Zooxanthellae
      if(c.zooxPop < 80){
        c.zooxPop = clamp(c.zooxPop + 30, 0, c.zooxMax);
        // Add visual dots
        const addCount = Math.floor(30 * 0.8);
        for(let i=0;i<addCount && c.zooxDots.length < c.zooxMax*0.8;i++){
          c.zooxDots.push({
            ox: rand(-c.width*0.4, c.width*0.4),
            oy: rand(-c.height*0.4, c.height*0.4),
            phase: rand(0, Math.PI*2),
            speed: rand(0.5, 2),
            size: rand(1.5, 3)
          });
        }
        showNotification('Zooxanthellae seeded in ' + c.type.name);
      } else {
        energy += tool.cost;
        showNotification(c.type.name + ' already has enough zooxanthellae');
      }
      break;
    case 4: // Transplant
      if(c.dead){
        // Replace dead coral with new heat-resistant one
        const newType = randInt(0, CORAL_TYPES.length-1);
        const newCoral = createCoral(c.x, c.y, newType);
        newCoral.tempTolerance += 0.5; // Heat resistant
        newCoral.width = c.width;
        newCoral.height = c.height;
        newCoral.health = 60;
        newCoral.zooxPop = 50;
        initCoralZoox(newCoral);
        corals[coralIdx] = newCoral;
        showNotification('New heat-resistant ' + CORAL_TYPES[newType].name + ' planted!');
      } else {
        // Boost tolerance
        c.tempTolerance += 0.3;
        c.health = clamp(c.health + 5, 0, 100);
        showNotification(c.type.name + ' tolerance improved');
      }
      break;
  }
  selectedTool = -1;
}

function showNotification(text){
  notificationText = text;
  notificationTimer = 3;
}

function drawOceanBackground(){
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0D47A1');
  grad.addColorStop(0.3, '#0A3D8F');
  grad.addColorStop(0.7, '#01579B');
  grad.addColorStop(1, '#004D40');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Heatwave overlay
  if(activeEvent && activeEvent.effect === 'heat'){
    ctx.fillStyle = rgba(255,87,34, 0.08 + 0.04*Math.sin(gameTime*3));
    ctx.fillRect(0,0,W,H);
  }
  // Pollution overlay
  if(activeEvent && activeEvent.effect === 'pollution'){
    ctx.fillStyle = rgba(78,52,46, 0.15+0.05*Math.sin(gameTime*2));
    ctx.fillRect(0,0,W,H);
  }

  // Surface light
  ctx.fillStyle = rgba(100,200,255,0.05);
  ctx.fillRect(0,0,W,H*0.05);
  const surfGrad = ctx.createLinearGradient(0,0,0,H*0.15);
  surfGrad.addColorStop(0, rgba(150,220,255,0.08));
  surfGrad.addColorStop(1, rgba(150,220,255,0));
  ctx.fillStyle = surfGrad;
  ctx.fillRect(0,0,W,H*0.15);

  // Light caustics on sand
  const sandY = H * 0.82;
  for(let i=0;i<12;i++){
    const cx = (W*0.08) + (i/11)*W*0.84;
    const cy = sandY + Math.sin(gameTime*0.7+i*2)*3;
    const r = 20+Math.sin(gameTime*1.2+i)*10;
    ctx.fillStyle = rgba(255,255,200, 0.03+0.02*Math.sin(gameTime+i));
    ctx.beginPath();
    ctx.ellipse(cx, cy, r, r*0.3, Math.sin(gameTime*0.3+i)*0.2, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawSeafloor(){
  const sandY = H * 0.82;
  // Sand gradient
  const sandGrad = ctx.createLinearGradient(0, sandY, 0, H);
  sandGrad.addColorStop(0, '#A1887F');
  sandGrad.addColorStop(0.3, '#D7CCC8');
  sandGrad.addColorStop(1, '#8D6E63');
  ctx.fillStyle = sandGrad;
  ctx.beginPath();
  ctx.moveTo(0, sandY);
  for(let x=0;x<=W;x+=20){
    ctx.lineTo(x, sandY + Math.sin(x*0.02+1)*6 + Math.sin(x*0.05)*3);
  }
  ctx.lineTo(W, H);
  ctx.lineTo(0, H);
  ctx.closePath();
  ctx.fill();

  // Reef base rock
  const rockY = H * 0.78;
  ctx.fillStyle = '#6D4C41';
  ctx.beginPath();
  ctx.moveTo(W*0.05, H);
  ctx.lineTo(W*0.05, rockY+20);
  ctx.quadraticCurveTo(W*0.15, rockY-5, W*0.3, rockY+10);
  ctx.quadraticCurveTo(W*0.45, rockY-10, W*0.55, rockY+5);
  ctx.quadraticCurveTo(W*0.7, rockY-15, W*0.85, rockY+8);
  ctx.quadraticCurveTo(W*0.92, rockY, W*0.95, rockY+15);
  ctx.lineTo(W*0.95, H);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#5D4037';
  ctx.beginPath();
  ctx.moveTo(W*0.08, H);
  ctx.lineTo(W*0.08, rockY+25);
  ctx.quadraticCurveTo(W*0.2, rockY+5, W*0.35, rockY+15);
  ctx.quadraticCurveTo(W*0.5, rockY, W*0.65, rockY+12);
  ctx.quadraticCurveTo(W*0.8, rockY-5, W*0.92, rockY+20);
  ctx.lineTo(W*0.92, H);
  ctx.closePath();
  ctx.fill();

  // Small seagrass
  ctx.strokeStyle = rgba(76,175,80,0.4);
  ctx.lineWidth = 2;
  for(let i=0;i<15;i++){
    const gx = W*0.05 + i*(W*0.9/15) + rand(-10,10);
    const gy = sandY + rand(-2,5);
    const sway = Math.sin(gameTime*1.5+i*1.5)*5;
    ctx.beginPath();
    ctx.moveTo(gx, gy);
    ctx.quadraticCurveTo(gx+sway, gy-15, gx+sway*1.5, gy-25-rand(0,10));
    ctx.stroke();
  }
}

function drawToolbar(){
  const tbY = toolbarY;
  const tbH = 72;
  // Background
  ctx.fillStyle = rgba(10,25,60,0.82);
  roundRect(ctx, 10, tbY, W-20, tbH, 10);
  ctx.fill();

  const toolW = Math.min(120, (W-60)/TOOLS.length);
  const startX = W/2 - (TOOLS.length * toolW)/2;

  for(let i=0;i<TOOLS.length;i++){
    const t = TOOLS[i];
    const tx = startX + i * toolW;
    const ty = tbY + 6;
    const tw = toolW - 8;
    const th = 58;
    const hover = pointInRect(mouseX, mouseY, tx, ty, tw, th);
    const sel = (selectedTool === i);
    const canAfford = energy >= t.cost;

    ctx.fillStyle = sel ? rgba(255,255,255,0.25) : hover ? rgba(255,255,255,0.12) : rgba(255,255,255,0.05);
    if(!canAfford) ctx.fillStyle = rgba(100,100,100,0.2);
    roundRect(ctx, tx, ty, tw, th, 6);
    ctx.fill();
    if(sel){
      ctx.strokeStyle = '#FFD700';
      ctx.lineWidth = 2;
      roundRect(ctx, tx, ty, tw, th, 6);
      ctx.stroke();
    }

    // Icon circle
    const icx = tx + tw/2;
    const icy = ty + 18;
    ctx.fillStyle = canAfford ? t.color : '#666';
    ctx.beginPath();
    ctx.arc(icx, icy, 13, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px "Segoe UI",Arial,sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(t.icon, icx, icy);

    // Name and cost
    ctx.font = '9px "Segoe UI",Arial,sans-serif';
    ctx.fillStyle = canAfford ? '#fff' : '#888';
    ctx.textBaseline = 'top';
    ctx.fillText(t.name, icx, ty+34);
    ctx.fillStyle = canAfford ? '#FFD700' : '#666';
    ctx.font = 'bold 9px "Segoe UI",Arial,sans-serif';
    ctx.fillText(t.cost + ' E', icx, ty+46);
  }

  // Tool description
  if(selectedTool >= 0){
    ctx.fillStyle = rgba(255,255,255,0.7);
    ctx.font = '12px "Segoe UI",Arial,sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText('Click a coral to apply: ' + TOOLS[selectedTool].desc, W/2, tbY-4);
  }
}

function drawTitleCoral(x,y,col,vibrancy){
  ctx.fillStyle = rgba(col[0],col[1],col[2],vibrancy);
  // Simple branching shape
  for(let i=-2;i<=2;i++){
    const bx = x + i*12;
    const bh = 30 + Math.abs(i)*10;
    ctx.beginPath();
    ctx.moveTo(bx-4, y);
    ctx.lineTo(bx-6, y-bh);
    ctx.lineTo(bx+6, y-bh);
    ctx.lineTo(bx+4, y);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.arc(bx, y-bh, 5, 0, Math.PI*2);
    ctx.fill();
  }
  // Dots inside if vibrant
  if(vibrancy > 0.5){
    ctx.fillStyle = rgba(255,255,150,0.6);
    for(let i=0;i<8;i++){
      ctx.beginPath();
      ctx.arc(x+rand(-20,20), y-rand(10,40), 2, 0, Math.PI*2);
      ctx.fill();
    }
  }
}

  }
  if(howtoPage < pages.length-1){
    buttons.push(makeButton(cardX+cardW-120, navY, 100, 35, 'Next', '#1565C0', ()=>{howtoPage++;}, 14));
  } else {
    buttons.push(makeButton(cardX+cardW-120, navY, 100, 35, 'Start!', '#E91E63', ()=>{
      state = STATES.LEVEL_SELECT;
    }, 14));
  }

  // Page dots
  ctx.textAlign = 'center';
  for(let i=0;i<pages.length;i++){
    ctx.fillStyle = i===howtoPage ? '#FFD700' : rgba(255,255,255,0.3);
    ctx.beginPath();
    ctx.arc(W/2+(i-1)*16, navY+17, 4, 0, Math.PI*2);
    ctx.fill();
  }

  for(const b of buttons) drawButton(b);
}

// ---- LEVEL SELECT ----
function drawLevelSelect(){
  drawOceanBackground();
  ctx.fillStyle = rgba(0,0,0,0.5);
  ctx.fillRect(0,0,W,H);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 30px "Segoe UI",Arial,sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText('SELECT REEF', W/2, 20);

  buttons = [];
  const cardW = Math.min(160, (W-80)/5);
  const totalW = cardW*5+40;
  const startX = W/2-totalW/2;
  const cardY = H*0.2;
  const cardH = H*0.55;

  for(let i=0;i<LEVELS.length;i++){
    const lvl = LEVELS[i];
    const cx = startX + i*(cardW+10);
    const unlocked = i < unlockedLevels;

    ctx.fillStyle = unlocked ? rgba(13,71,161,0.85) : rgba(50,50,50,0.7);
    roundRect(ctx, cx, cardY, cardW, cardH, 10);
    ctx.fill();
    if(unlocked){
      ctx.strokeStyle = rgba(255,255,255,0.2);
      ctx.lineWidth = 1;
      roundRect(ctx, cx, cardY, cardW, cardH, 10);
      ctx.stroke();
    }

    // Level number
    ctx.fillStyle = unlocked ? '#FFD700' : '#666';
    ctx.font = 'bold 32px "Segoe UI",Arial,sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(''+(i+1), cx+cardW/2, cardY+15);

    // Name
    ctx.fillStyle = unlocked ? '#fff' : '#888';
    ctx.font = 'bold 13px "Segoe UI",Arial,sans-serif';
    ctx.fillText(lvl.name, cx+cardW/2, cardY+58);

    // Description
    ctx.font = '10px "Segoe UI",Arial,sans-serif';
    ctx.fillStyle = unlocked ? rgba(255,255,255,0.7) : '#666';
    wrapText(ctx, lvl.desc, cx+cardW/2, cardY+80, cardW-16, 14);

    // Medal
    if(levelMedals[i] > 0){
      const medalColors = ['','#CD7F32','#C0C0C0','#FFD700'];
      const medalNames = ['','Bronze','Silver','Gold'];
      ctx.fillStyle = medalColors[levelMedals[i]];
      ctx.beginPath();
      ctx.arc(cx+cardW/2, cardY+cardH-60, 16, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#000';
      ctx.font = 'bold 10px "Segoe UI",Arial,sans-serif';
      ctx.fillText(medalNames[levelMedals[i]], cx+cardW/2, cardY+cardH-56);
    }

    // Score
    if(levelScores[i] > 0){
      ctx.fillStyle = rgba(255,255,255,0.6);
      ctx.font = '11px "Segoe UI",Arial,sans-serif';
      ctx.fillText('Best: ' + levelScores[i], cx+cardW/2, cardY+cardH-35);
    }

    // Lock icon
    if(!unlocked){
      ctx.fillStyle = rgba(255,255,255,0.3);
      ctx.font = '36px "Segoe UI",Arial,sans-serif';
      ctx.font = 'bold 28px "Segoe UI",Arial,sans-serif';
      ctx.fillText('LOCKED', cx+cardW/2, cardY+cardH/2-10);
    }

    if(unlocked){
      buttons.push(makeButton(cx+10, cardY+cardH-25, cardW-20, 22, 'PLAY', '#E91E63', ((idx)=>()=>{
        initLevel(idx);
      })(i), 11));
    }
  }

  // Back button
  buttons.push(makeButton(20, H-50, 100, 35, 'Back', '#455A64', ()=>{state=STATES.TITLE;}, 14));

  for(const b of buttons) drawButton(b);
}

function wrapText(ctx, text, x, y, maxW, lineH){
  const words = text.split(' ');
  let line = '';
  let ty = y;
  for(const w of words){
    const test = line + w + ' ';
    if(ctx.measureText(test).width > maxW && line !== ''){
      ctx.fillText(line.trim(), x, ty);
      line = w + ' ';
      ty += lineH;
    } else {
      line = test;
    }
  }
  ctx.fillText(line.trim(), x, ty);
}

// ---- LEVEL COMPLETE / GAME OVER ----
function drawLevelComplete(){
  drawOceanBackground();
  drawSeafloor();
  for(const c of corals) drawCoral(c, -1);
  for(const f of fish) if(f.alive) drawFish(f);
  drawParticles();

  ctx.fillStyle = rgba(0,0,0,0.6);
  ctx.fillRect(0,0,W,H);

  const d = levelCompleteData;
  if(!d) return;

  const panelW = Math.min(500, W*0.7);
  const panelH = Math.min(380, H*0.75);
  const px = W/2-panelW/2;
  const py = H/2-panelH/2;

  ctx.fillStyle = rgba(13,71,161,0.92);
  roundRect(ctx, px, py, panelW, panelH, 14);
  ctx.fill();
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 3;
  roundRect(ctx, px, py, panelW, panelH, 14);
  ctx.stroke();

  ctx.textAlign = 'center';
  ctx.fillStyle = d.survived ? '#4CAF50' : '#F44336';
  ctx.font = 'bold 28px "Segoe UI",Arial,sans-serif';
  ctx.fillText(d.survived ? 'REEF SURVIVED!' : 'REEF LOST', W/2, py+35);

  ctx.font = '15px "Segoe UI",Arial,sans-serif';
  ctx.fillStyle = '#fff';
  let sy = py + 75;
  const lines = [
    ['Average Coral Health:', d.avgH.toFixed(1) + '%'],
    ['Zooxanthellae Population:', d.avgZ.toFixed(1) + '%'],
    ['Biodiversity Bonus:', '+' + d.bioScore],
    ['Time Bonus:', '+' + d.timeBonus],
    ['',''],
    ['TOTAL SCORE:', '' + d.finalScore]
  ];
  for(const [label,val] of lines){
    if(!label && !val){sy+=10;continue;}
    ctx.textAlign = 'left';
    ctx.fillStyle = label === 'TOTAL SCORE:' ? '#FFD700' : '#ccc';
    ctx.font = label === 'TOTAL SCORE:' ? 'bold 18px "Segoe UI",Arial,sans-serif' : '14px "Segoe UI",Arial,sans-serif';
    ctx.fillText(label, px+30, sy);
    ctx.textAlign = 'right';
    ctx.fillStyle = label === 'TOTAL SCORE:' ? '#FFD700' : '#fff';
    ctx.fillText(val, px+panelW-30, sy);
    sy += 26;
  }

  // Medal
  if(d.medal > 0){
    const mc = ['','#CD7F32','#C0C0C0','#FFD700'][d.medal];
    const mn = ['','BRONZE','SILVER','GOLD'][d.medal];
    ctx.fillStyle = mc;
    ctx.beginPath();
    ctx.arc(W/2, sy+20, 22, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.font = 'bold 11px "Segoe UI",Arial,sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(mn, W/2, sy+24);
  }

  buttons = [];
  const btnY = py+panelH-50;
  buttons.push(makeButton(W/2-180, btnY, 110, 36, 'MENU', '#455A64', ()=>{state=STATES.TITLE;}, 14));
  buttons.push(makeButton(W/2-55, btnY, 110, 36, 'RETRY', '#FF9800', ()=>{initLevel(currentLevel);}, 14));
  if(d.survived && currentLevel < LEVELS.length-1){
    buttons.push(makeButton(W/2+70, btnY, 110, 36, 'NEXT', '#4CAF50', ()=>{initLevel(currentLevel+1);}, 14));
  }
  for(const b of buttons) drawButton(b);
}

// ---- MAIN DRAW ----
function drawPlaying(){
  drawOceanBackground();
  drawSeafloor();

  // Draw light ray particles first (behind everything)
  for(const p of particles){
    if(p.type === 'light'){
      const a = clamp(p.life, 0, 1) * (p.alpha||1);
      ctx.globalAlpha = a;
      drawLightRay(p);
    }
  }
  ctx.globalAlpha = 1;

  // Draw corals
  for(let i=0;i<corals.length;i++){
    drawCoral(corals[i], i);
  }

  // Draw fish
  for(const f of fish){
    if(f.alive) drawFish(f);
  }

  // Draw non-light particles
  for(const p of particles){
    if(p.type === 'light') continue;
    const a = clamp(p.life, 0, 1) * (p.alpha||1);
    if(a <= 0) continue;
    ctx.globalAlpha = a;
    if(p.type === 'current'){
      ctx.strokeStyle = p.color;
      ctx.lineWidth = p.size;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius||10, 0, Math.PI*2);
      ctx.stroke();
    } else {
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;

  drawHUD();
  drawToolbar();
}

// ---- INPUT ----
function handleClick(x, y){
  // Check buttons first
  for(const b of buttons){
    if(pointInRect(x, y, b.x, b.y, b.w, b.h)){
      b.action();
      playSound('click');
      return;
    }
  }

  if(state === STATES.TITLE){
    // Click anywhere to start
    initAudio();
    state = STATES.HOWTO;
    howtoPage = 0;
    return;
  }

  if(state !== STATES.PLAYING) return;

  // Check toolbar
  const tbY = toolbarY;
  const toolW = Math.min(120, (W-60)/TOOLS.length);
  const startX = W/2 - (TOOLS.length * toolW)/2;
  for(let i=0;i<TOOLS.length;i++){
    const tx = startX + i * toolW;
    const ty = tbY + 6;
    const tw = toolW - 8;
    const th = 58;
    if(pointInRect(x, y, tx, ty, tw, th)){
      if(energy >= TOOLS[i].cost){
        selectedTool = (selectedTool === i) ? -1 : i;
        playSound('click');
      } else {
        showNotification('Not enough energy for ' + TOOLS[i].name);
      }
      return;
    }
  }

  // Check coral clicks
  for(let i=0;i<corals.length;i++){
    const c = corals[i];
    const hw = c.width/2+10;
    const hh = c.height/2+10;
    if(x >= c.x-hw && x <= c.x+hw && y >= c.y-hh && y <= c.y+hh){
      if(selectedTool >= 0){
        applyTool(selectedTool, i);
      } else {
        selectedCoral = (selectedCoral === i) ? -1 : i;
      }
      playSound('click');
      return;
    }
  }

  // Clicked empty space
  selectedCoral = -1;
  selectedTool = -1;
}

canvas.addEventListener('mousedown', (e)=>{
  mouseDown = true;
  const rect = canvas.getBoundingClientRect();
  clickX = e.clientX - rect.left;
  clickY = e.clientY - rect.top;
  clickHandled = false;
});
canvas.addEventListener('mouseup', ()=>{
  if(!clickHandled){
    handleClick(clickX, clickY);
    clickHandled = true;
  }
  mouseDown = false;
});
canvas.addEventListener('mousemove', (e)=>{
  const rect = canvas.getBoundingClientRect();
  mouseX = e.clientX - rect.left;
  mouseY = e.clientY - rect.top;

  // Hover detection for corals
  if(state === STATES.PLAYING){
    hoveredCoral = -1;
    for(let i=0;i<corals.length;i++){
      const c = corals[i];
      const hw = c.width/2+10;
      const hh = c.height/2+10;
      if(mouseX >= c.x-hw && mouseX <= c.x+hw && mouseY >= c.y-hh && mouseY <= c.y+hh){
        hoveredCoral = i;
        break;
      }
    }
  }
});
canvas.addEventListener('touchstart', (e)=>{
  e.preventDefault();
  const t = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  mouseX = t.clientX - rect.left;
  mouseY = t.clientY - rect.top;
  handleClick(mouseX, mouseY);
}, {passive:false});
canvas.addEventListener('touchmove', (e)=>{
  e.preventDefault();
  const t = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  mouseX = t.clientX - rect.left;
  mouseY = t.clientY - rect.top;
}, {passive:false});

// Keyboard shortcuts
document.addEventListener('keydown', (e)=>{
  if(state === STATES.PLAYING){
    const num = parseInt(e.key);
    if(num >= 1 && num <= 5){
      const idx = num - 1;
      if(energy >= TOOLS[idx].cost){
        selectedTool = (selectedTool === idx) ? -1 : idx;
        playSound('click');
      }
    }
    if(e.key === 'Escape'){
      selectedTool = -1;
      selectedCoral = -1;
    }
  }
});

// ---- MAIN LOOP ----
function gameLoop(timestamp){
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  frameCount++;

  resize();

  ctx.clearRect(0, 0, W, H);

  switch(state){
    case STATES.TITLE:
      buttons = [];
      drawTitle(dt);
      break;
    case STATES.HOWTO:
      drawHowTo();
      break;
    case STATES.LEVEL_SELECT:
      drawLevelSelect();
      break;
    case STATES.PLAYING:
      updatePlaying(dt);
      buttons = [];
      drawPlaying();
      break;
    case STATES.LEVEL_COMPLETE:
    case STATES.GAME_OVER:
      updateParticles(dt);
      // Keep fish moving for background
      for(const f of fish){
        if(!f.alive) continue;
        f.x += f.vx * dt;
        f.y = f.baseY + Math.sin(gameTime*1.5+f.phase)*f.amp;
        if(f.x > W+30) f.x = -30;
        if(f.x < -30) f.x = W+30;
      }
      gameTime += dt;
      buttons = [];
      drawLevelComplete();
      break;
  }

  requestAnimationFrame(gameLoop);
}

// ---- INIT ----
loadProgress();
lastTime = performance.now();
requestAnimationFrame(gameLoop);
</script>
