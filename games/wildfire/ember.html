// ===================================================================
// UTILITIES
// ===================================================================
function clamp(v,a,b){return v<a?a:v>b?b:v}
function lerp(a,b,t){return a+(b-a)*t}
function lerpColor(a,b,t){return[lerp(a[0],b[0],t),lerp(a[1],b[1],t),lerp(a[2],b[2],t)]}
function colStr(c){return`rgb(${c[0]|0},${c[1]|0},${c[2]|0})`}
function colAlpha(c,a){return`rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a})`}
function dist(x1,y1,x2,y2){return Math.hypot(x2-x1,y2-y1)}
function noise(x,y,s){const v=Math.sin(x*12.9898+y*78.233+s*43.682)*43758.5453;return v-Math.floor(v)}
function smoothNoise(x,y,s){
  const ix=Math.floor(x),iy=Math.floor(y),fx=x-ix,fy=y-iy;
  const a=noise(ix,iy,s),b=noise(ix+1,iy,s),c=noise(ix,iy+1,s),d=noise(ix+1,iy+1,s);
  return lerp(lerp(a,b,fx),lerp(c,d,fx),fy);
}
function g2sx(gx){return gridX+gx*cellSize}
function g2sy(gy){return gridY+gy*cellSize}
function p2sx(){return gridX+player.x*cellSize}
function p2sy(){return gridY+player.y*cellSize}

// ===================================================================
// AUDIO (Web Audio API — procedural, no files)
// ===================================================================
function initAudio(){
  if(audioCtx)return;
  try{
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    masterGain=audioCtx.createGain();
    masterGain.gain.value=0.25;
    masterGain.connect(audioCtx.destination);
  }catch(e){}
}
function playNoiseBurst(dur,vol,freq){
  if(!audioCtx)return;
  const len=audioCtx.sampleRate*dur|0;
  const buf=audioCtx.createBuffer(1,len,audioCtx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*vol*(1-i/len);
  const src=audioCtx.createBufferSource();
  src.buffer=buf;
  if(freq){
    const f=audioCtx.createBiquadFilter();
    f.type='bandpass';f.frequency.value=freq;f.Q.value=1.5;
    src.connect(f);f.connect(masterGain);
  }else{src.connect(masterGain)}
  src.start();
}
function playTone(freq,dur,type){
  if(!audioCtx)return;
  const o=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  o.type=type||'sine';
  o.frequency.value=freq;
  g.gain.setValueAtTime(0.12,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.connect(g);g.connect(masterGain);
  o.start();o.stop(audioCtx.currentTime+dur);
}
function sfxCrackle(){playNoiseBurst(0.04,0.25,3500)}
function sfxGrow(){playTone(520,0.12,'sine');setTimeout(()=>playTone(780,0.08,'sine'),40)}

// ===================================================================
// PARTICLES
// ===================================================================
function spawnP(x,y,vx,vy,life,type,r,g,b){
  if(pCount>=MAX_P)return;
  const i=pCount++;
  ppx[i]=x;ppy[i]=y;pvx[i]=vx;pvy[i]=vy;
  plf[i]=life;pml[i]=life;pty[i]=type;
  pcr[i]=r;pcg[i]=g;pcb[i]=b;
}
function updateParticles(dt){
  for(let i=pCount-1;i>=0;i--){
    plf[i]-=dt;
    if(plf[i]<=0){
      pCount--;
      if(i<pCount){
        ppx[i]=ppx[pCount];ppy[i]=ppy[pCount];
        pvx[i]=pvx[pCount];pvy[i]=pvy[pCount];
        plf[i]=plf[pCount];pml[i]=pml[pCount];
        pty[i]=pty[pCount];
        pcr[i]=pcr[pCount];pcg[i]=pcg[pCount];pcb[i]=pcb[pCount];
      }
      continue;
    }
    ppx[i]+=pvx[i]*dt;
    ppy[i]+=pvy[i]*dt;
    if(pty[i]===0)pvy[i]-=3*dt; // fire rises
    if(pty[i]===2)pvy[i]+=5*dt; // rain falls
  }
}
function renderParticles(){
  // Fire (additive)
  ctx.globalCompositeOperation='lighter';
  for(let i=0;i<pCount;i++){
    if(pty[i]!==0)continue;
    const t=plf[i]/pml[i];
    const sz=2+t*4;
    const sx=g2sx(ppx[i]),sy=g2sy(ppy[i]);
    ctx.fillStyle=`rgba(${pcr[i]*255|0},${pcg[i]*255|0},${pcb[i]*255|0},${t.toFixed(2)})`;
    ctx.fillRect(sx-sz/2,sy-sz/2,sz,sz);
  }
  ctx.globalCompositeOperation='source-over';
  // Wind + rain
  for(let i=0;i<pCount;i++){
    if(pty[i]===0)continue;
    const t=plf[i]/pml[i];
    const sx=g2sx(ppx[i]),sy=g2sy(ppy[i]);
    if(pty[i]===2){
      ctx.fillStyle=`rgba(${pcr[i]*255|0},${pcg[i]*255|0},${pcb[i]*255|0},${(t*0.5).toFixed(2)})`;
      ctx.fillRect(sx-1,sy-1,2,6);
    }else{
      ctx.fillStyle=`rgba(${pcr[i]*255|0},${pcg[i]*255|0},${pcb[i]*255|0},${(t*0.4).toFixed(2)})`;
      ctx.fillRect(sx-2,sy-2,4,4);
    }
  }
}

function addFloat(x,y,text,color){
  floats.push({x,y,text,color,life:1.2,maxLife:1.2});

function updateFloats(dt){
  for(let i=floats.length-1;i>=0;i--){
    floats[i].life-=dt;
    floats[i].y-=40*dt;
    if(floats[i].life<=0)floats.splice(i,1);
  }
}
function renderFloats(){
  for(const f of floats){
    const t=f.life/f.maxLife;
    ctx.globalAlpha=t;
    ctx.font=`bold ${14+t*4|0}px system-ui,sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle=f.color;
    ctx.fillText(f.text,f.x,f.y);
  }
  ctx.globalAlpha=1;
}

// ===================================================================
// GRID SYSTEM
// ===================================================================
function initGridArrays(){
  terrain=new Uint8Array(GRID_W*GRID_H);
  cellState=new Uint8Array(GRID_W*GRID_H);
  moisture=new Float32Array(GRID_W*GRID_H);
  burnTime=new Float32Array(GRID_W*GRID_H);
}

function generateGrid(li){
  const cfg=LEVELS[li];
  const seed=li*137+42;
  for(let y=0;y<GRID_H;y++){
    for(let x=0;x<GRID_W;x++){
      const idx=y*GRID_W+x;
      terrain[idx]=T_VEG;
      const n=smoothNoise(x*0.15,y*0.15,seed);
      moisture[idx]=clamp(cfg.baseMoisture+(n-0.5)*cfg.moistureNoise*2,0,1);
      updateCellFromMoisture(idx);
      burnTime[idx]=0;
    }
  }
  // Apply features
  for(const f of cfg.features){
    if(f.type==='river')applyRiver(f.x1,f.y1,f.x2,f.y2,f.w);
    else if(f.type==='lake')applyCircle(f.x,f.y,f.r,T_WATER,1);
    else if(f.type==='rocks')applyCircle(f.x,f.y,f.r,T_ROCK,0);
    else if(f.type==='wet')applyMoistureCircle(f.x,f.y,f.r,f.m);
    else if(f.type==='dry')applyMoistureCircle(f.x,f.y,f.r,f.m);
  }
  gridDirty=true;
}

function updateCellFromMoisture(idx){
  if(terrain[idx]!==T_VEG){cellState[idx]=S_WET;return}
  if(cellState[idx]===S_BURNING||cellState[idx]===S_BURNED)return;
  const m=moisture[idx];
  if(m>0.5)cellState[idx]=S_WET;
  else if(m>0.3)cellState[idx]=S_DRYING;
  else cellState[idx]=S_DRY;
}

function applyRiver(x1,y1,x2,y2,w){
  const steps=Math.max(Math.abs(x2-x1),Math.abs(y2-y1))*3;
  for(let i=0;i<=steps;i++){
    const t=i/steps;
    const cx=lerp(x1,x2,t)+Math.sin(t*6)*1.5;
    const cy=lerp(y1,y2,t);
    for(let dx=-Math.ceil(w);dx<=Math.ceil(w);dx++){
      for(let dy=-Math.ceil(w);dy<=Math.ceil(w);dy++){
        if(Math.hypot(dx,dy)>w)continue;
        const gx=Math.round(cx+dx),gy=Math.round(cy+dy);
        if(gx<0||gx>=GRID_W||gy<0||gy>=GRID_H)continue;
        const idx=gy*GRID_W+gx;
        terrain[idx]=T_WATER;moisture[idx]=1;cellState[idx]=S_WET;
      }
    }
  }
}

function applyCircle(cx,cy,r,t,m){
  for(let dy=-Math.ceil(r);dy<=Math.ceil(r);dy++){
    for(let dx=-Math.ceil(r);dx<=Math.ceil(r);dx++){
      if(Math.hypot(dx,dy)>r)continue;
      const gx=Math.round(cx+dx),gy=Math.round(cy+dy);
      if(gx<0||gx>=GRID_W||gy<0||gy>=GRID_H)continue;
      const idx=gy*GRID_W+gx;
      terrain[idx]=t;moisture[idx]=m;updateCellFromMoisture(idx);
    }
  }
}

function applyMoistureCircle(cx,cy,r,m){
  for(let dy=-Math.ceil(r);dy<=Math.ceil(r);dy++){
    for(let dx=-Math.ceil(r);dx<=Math.ceil(r);dx++){
      const d=Math.hypot(dx,dy);
      if(d>r)continue;
      const gx=Math.round(cx+dx),gy=Math.round(cy+dy);
      if(gx<0||gx>=GRID_W||gy<0||gy>=GRID_H)continue;
      const idx=gy*GRID_W+gx;
      if(terrain[idx]!==T_VEG)continue;
      const blend=1-d/r;
      moisture[idx]=lerp(moisture[idx],m,blend*0.8);
      updateCellFromMoisture(idx);
    }
  }
}

function updateGrid(dt){
  for(let i=0;i<GRID_W*GRID_H;i++){
    if(cellState[i]===S_BURNING){
      burnTime[i]+=dt;
      if(burnTime[i]>=BURN_DUR){
        cellState[i]=S_BURNED;
        gridDirty=true;
      }
    }
  }
}

function getCellColor(idx,t){
  const ter=terrain[idx];
  if(ter===T_WATER){
    const shimmer=0.9+noise(idx*0.3,0,t*2)*0.1;
    return[C_WATER[0]*shimmer,C_WATER[1]*shimmer,C_WATER[2]*shimmer];
  }
  if(ter===T_ROCK)return C_ROCK;
  const st=cellState[idx];
  const m=moisture[idx];
  switch(st){
    case S_WET:return lerpColor(C_WET,C_WET_BRIGHT,clamp((m-0.5)/0.5,0,1));
    case S_DRYING:return lerpColor(C_DRY,C_WET,clamp((m-0.3)/0.2,0,1));
    case S_DRY:return lerpColor(C_DRY_DARK,C_DRY,clamp(m/0.3,0,1));
    case S_BURNING:{
      const fl=noise(idx*0.5,0,t*10);
      const c=lerpColor(C_BURN1,C_BURN2,fl);
      if(fl>0.8)return lerpColor(c,C_EMBER_COL,(fl-0.8)*5);
      return c;
    }
    case S_BURNED:return C_BURNED;
  }
  return C_DRY;
}

// ===================================================================
// PLAYER
// ===================================================================
function resetPlayer(cfg){
  player.x=cfg.startX;
  player.y=cfg.startY;
  player.vx=0;player.vy=0;
  player.size=P_START;
  lastCellIdx=-1;
}

function getComboMult(){
  if(combo>=20)return 5;
  if(combo>=10)return 3;
  if(combo>=5)return 2;
  return 1;
}

function getSizeMult(){
  if(player.size>=31)return 5;
  if(player.size>=21)return 3;
  if(player.size>=11)return 2;
  return 1;
}

function updatePlayer(dt){
  // Acceleration from input
  player.vx+=inputX*P_ACCEL*dt;
  player.vy+=inputY*P_ACCEL*dt;
  // Friction
  player.vx*=Math.pow(P_FRICTION,dt*60);
  player.vy*=Math.pow(P_FRICTION,dt*60);
  // Speed cap
  const spd=Math.hypot(player.vx,player.vy);
  const maxSpd=6+player.size*0.05;
  if(spd>maxSpd){player.vx*=maxSpd/spd;player.vy*=maxSpd/spd}
  // Move
  player.x+=player.vx*dt;
  player.y+=player.vy*dt;
  // Clamp to grid
  player.x=clamp(player.x,0.5,GRID_W-0.5);
  player.y=clamp(player.y,0.5,GRID_H-0.5);
  // Natural decay
  player.size-=P_DECAY*dt;
}

function handleGridCollision(dt){
  const gx=clamp(Math.floor(player.x),0,GRID_W-1);
  const gy=clamp(Math.floor(player.y),0,GRID_H-1);
  const idx=gy*GRID_W+gx;

  // Water — continuous shrink
  if(terrain[idx]===T_WATER){
    if(shieldTimer<=0){player.size-=P_SHRINK_WATER*dt;combo=0}
    if(idx!==lastCellIdx)lastCellIdx=idx;
    return;
  }
  if(terrain[idx]===T_ROCK){
    if(idx!==lastCellIdx)lastCellIdx=idx;
    return;
  }

  const st=cellState[idx];
  // Continuous wet effect
  if(st===S_WET&&shieldTimer<=0){player.size-=P_SHRINK_WET*dt;combo=0}
  else if(st===S_DRYING&&shieldTimer<=0){player.size-=0.15*dt}

  // Consume dry cell (once per cell)
  if(idx!==lastCellIdx&&st===S_DRY){
    cellState[idx]=S_BURNING;
    burnTime[idx]=0;
    gridDirty=true;
    combo++;
    const cm=getComboMult(),sm=getSizeMult();
    const pts=10*cm*sm;
    score+=pts;
    player.size=Math.min(P_MAX,player.size+P_GROW);
    sfxCrackle();
    addFloat(p2sx(),p2sy()-20,'+'+pts,'#FFD166');
    if(combo===5)addFloat(p2sx(),p2sy()-40,'2x COMBO!','#FF8C42');
    if(combo===10)addFloat(p2sx(),p2sy()-40,'3x COMBO!','#FF4444');
    if(combo===20)addFloat(p2sx(),p2sy()-40,'5x COMBO!','#FFE066');
    // Burst particles
    for(let j=0;j<4;j++){
      spawnP(player.x+(Math.random()-0.5)*0.5,player.y+(Math.random()-0.5)*0.5,
        (Math.random()-0.5)*2,-1-Math.random()*3,
        0.3+Math.random()*0.3,0,1,0.4+Math.random()*0.4,0);
    }
  }
  if(idx!==lastCellIdx)lastCellIdx=idx;
}

// ===================================================================
// CLOUDS
// ===================================================================
function initClouds(cfg){
  clouds=[];
  for(const c of cfg.clouds){
    clouds.push({x:c.x,y:c.y,vx:c.vx,vy:c.vy,radius:c.r});
  }
}

function updateClouds(dt){
  for(const c of clouds){
    c.x+=c.vx*dt;
    c.y+=c.vy*dt;
    // Wrap horizontally
    if(c.x<-c.radius*2)c.x=GRID_W+c.radius;
    if(c.x>GRID_W+c.radius*2)c.x=-c.radius;
    // Bounce vertically
    if(c.y<c.radius){c.y=c.radius;c.vy=Math.abs(c.vy)}
    if(c.y>GRID_H-c.radius){c.y=GRID_H-c.radius;c.vy=-Math.abs(c.vy)}
    // Wet terrain
    const ir=Math.ceil(c.radius);
    for(let dy=-ir;dy<=ir;dy++){
      for(let dx=-ir;dx<=ir;dx++){
        if(Math.hypot(dx,dy)>c.radius)continue;
        const gx=Math.floor(c.x+dx),gy=Math.floor(c.y+dy);
        if(gx<0||gx>=GRID_W||gy<0||gy>=GRID_H)continue;
        const idx=gy*GRID_W+gx;
        if(terrain[idx]!==T_VEG)continue;
        if(cellState[idx]===S_BURNED)continue;
        moisture[idx]=Math.min(1,moisture[idx]+0.4*dt);
        const oldSt=cellState[idx];
        updateCellFromMoisture(idx);
        if(cellState[idx]!==oldSt)gridDirty=true;
      }
    }
    // Rain particles
    if(Math.random()<dt*15){
      spawnP(c.x+(Math.random()-0.5)*c.radius*2,c.y+c.radius*0.3,
        c.vx*0.2,3+Math.random()*2,
        0.4+Math.random()*0.2,2,0.5,0.65,0.9);
    }
    // Shrink player if in radius
    if(shieldTimer<=0){
      const d=dist(player.x,player.y,c.x,c.y);
      if(d<c.radius){
        player.size-=P_SHRINK_RAIN*dt;
        combo=0;
      }
    }
  }
}

function renderClouds(t){
  for(const c of clouds){
    const cx=g2sx(c.x),cy=g2sy(c.y),r=c.radius*cellSize;
    // Shadow
    ctx.fillStyle='rgba(0,0,20,0.12)';
    ctx.beginPath();
    ctx.ellipse(cx,cy+r*0.4,r*1.1,r*0.3,0,0,Math.PI*2);
    ctx.fill();
    // Cloud body
    const wobble=Math.sin(t*1.5+c.x)*r*0.05;
    ctx.fillStyle='rgba(170,180,200,0.55)';
    ctx.beginPath();ctx.arc(cx,cy-r*0.25+wobble,r*0.65,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx-r*0.4,cy+wobble*0.5,r*0.45,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+r*0.4,cy+wobble*0.5,r*0.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx,cy+r*0.1+wobble*0.3,r*0.55,0,Math.PI*2);ctx.fill();
  }
}

// ===================================================================
// WIND ZONES
// ===================================================================
function initWindZones(cfg){
  windZones=[];
  for(const w of cfg.winds){
    windZones.push({x:w.x,y:w.y,w:w.w,h:w.h,fx:w.fx,fy:w.fy});
  }
}

function handleWindZones(dt){
  for(const wz of windZones){
    if(player.x>=wz.x&&player.x<wz.x+wz.w&&player.y>=wz.y&&player.y<wz.y+wz.h){
      player.vx+=wz.fx*dt*2;
      player.vy+=wz.fy*dt*2;
    }
  }
}

function spawnWindParticles(dt){
  for(const wz of windZones){
    if(Math.random()<dt*4){
      spawnP(wz.x+Math.random()*wz.w,wz.y+Math.random()*wz.h,
        wz.fx*2.5,wz.fy*2.5,
        0.6+Math.random()*0.4,1,0.7,0.7,0.85);
    }
  }
}

function renderWindZones(t){
  for(const wz of windZones){
    const sx=g2sx(wz.x),sy=g2sy(wz.y);
    const sw=wz.w*cellSize,sh=wz.h*cellSize;
    // Subtle overlay
    const pulse=0.04+Math.sin(t*3)*0.02;
    ctx.fillStyle=`rgba(200,200,230,${pulse})`;
    ctx.fillRect(sx,sy,sw,sh);
    // Directional lines
    ctx.strokeStyle='rgba(200,200,240,0.08)';
    ctx.lineWidth=1;
    const angle=Math.atan2(wz.fy,wz.fx);
    const lineSpacing=cellSize*2;
    const offset=(t*40)%lineSpacing;
    for(let i=-1;i<sh/lineSpacing+1;i++){
      const ly=sy+i*lineSpacing+offset;
      if(ly<sy||ly>sy+sh)continue;
      ctx.beginPath();
      ctx.moveTo(sx,ly);
      ctx.lineTo(sx+sw,ly+Math.tan(angle)*sw*0.3);
      ctx.stroke();
    }
  }
}

// ===================================================================
// POWER-UPS
// ===================================================================
function initPowerUps(){
  powerUps=[];
  puSpawnTimer=5; // first one at 5 seconds
}

function spawnPowerUp(){
  // Find a random dry cell
  const dryCells=[];
  for(let i=0;i<GRID_W*GRID_H;i++){
    if(terrain[i]===T_VEG&&cellState[i]===S_DRY)dryCells.push(i);
  }
  if(dryCells.length===0)return;
  const idx=dryCells[Math.floor(Math.random()*dryCells.length)];
  const gx=idx%GRID_W,gy=Math.floor(idx/GRID_W);
  const type=Math.floor(Math.random()*4);
  powerUps.push({x:gx+0.5,y:gy+0.5,type,collected:false,time:0});
}

function updatePowerUps(dt){
  const cfg=LEVELS[currentLevel];
  puSpawnTimer-=dt;
  if(puSpawnTimer<=0&&powerUps.filter(p=>!p.collected).length<3){
    spawnPowerUp();
    puSpawnTimer=cfg.puInterval+Math.random()*4;
  }
  for(const pu of powerUps)pu.time+=dt;
  // Check collision
  for(const pu of powerUps){
    if(pu.collected)continue;
    if(dist(player.x,player.y,pu.x,pu.y)<1){
      pu.collected=true;
      activatePowerUp(pu.type);
    }
  }
  // Clean old
  powerUps=powerUps.filter(p=>!p.collected||p.time<2);
  // Active power-up timer
  if(activePowerUpTimer>0){
    activePowerUpTimer-=dt;
    if(activePowerUpTimer<=0)activePowerUp=-1;
  }
}

function activatePowerUp(type){
  sfxPowerUp();
  screenShake=3;
  switch(type){
    case PU_DROUGHT:{
      // Dry cells in radius
      const r=6;
      for(let dy=-r;dy<=r;dy++){
        for(let dx=-r;dx<=r;dx++){
          if(Math.hypot(dx,dy)>r)continue;
          const gx=Math.floor(player.x+dx),gy=Math.floor(player.y+dy);
          if(gx<0||gx>=GRID_W||gy<0||gy>=GRID_H)continue;
          const idx=gy*GRID_W+gx;
          if(terrain[idx]!==T_VEG||cellState[idx]===S_BURNED||cellState[idx]===S_BURNING)continue;
          moisture[idx]=Math.max(0,moisture[idx]-0.5);
          updateCellFromMoisture(idx);
        }
      }
      gridDirty=true;
      flashColor='rgba(212,160,85,';flashAlpha=0.3;
      addFloat(p2sx(),p2sy()-30,'DROUGHT!','#D4A055');
      break;
    }
    case PU_WIND:{
      const mag=8;
      const dir=Math.atan2(player.vy||0.1,player.vx||1);
      player.vx+=Math.cos(dir)*mag;
      player.vy+=Math.sin(dir)*mag;
      sfxWind();
      flashColor='rgba(200,200,230,';flashAlpha=0.2;
      addFloat(p2sx(),p2sy()-30,'WIND SURGE!','#C8C8E0');
      break;
    }
    case PU_LIGHTNING:{
      // Teleport to random dry cell
      const dryCells=[];
      for(let i=0;i<GRID_W*GRID_H;i++){
        if(terrain[i]===T_VEG&&cellState[i]===S_DRY)dryCells.push(i);
      }
      if(dryCells.length>0){
        const idx=dryCells[Math.floor(Math.random()*dryCells.length)];
        player.x=(idx%GRID_W)+0.5;
        player.y=Math.floor(idx/GRID_W)+0.5;
        player.vx=0;player.vy=0;
        lastCellIdx=-1;
      }
      flashColor='rgba(102,187,255,';flashAlpha=0.35;
      addFloat(p2sx(),p2sy()-30,'LIGHTNING!','#66BBFF');
      break;
    }
    case PU_SHIELD:{
      shieldTimer=5;
      activePowerUp=PU_SHIELD;
      activePowerUpTimer=5;
      flashColor='rgba(102,255,204,';flashAlpha=0.2;
      addFloat(p2sx(),p2sy()-30,'HEAT SHIELD!','#66FFCC');
      break;
    }
  }
}

function renderPowerUps(t){
  for(const pu of powerUps){
    if(pu.collected)continue;
    const sx=g2sx(pu.x),sy=g2sy(pu.y);
    const pulse=1+Math.sin(t*6+pu.x)*0.2;
    const r=cellSize*0.4*pulse;
    // Glow
    ctx.globalCompositeOperation='lighter';
    const grad=ctx.createRadialGradient(sx,sy,0,sx,sy,r*2.5);
    grad.addColorStop(0,PU_COLORS[pu.type]+'55');
    grad.addColorStop(1,PU_COLORS[pu.type]+'00');
    ctx.fillStyle=grad;
    ctx.beginPath();ctx.arc(sx,sy,r*2.5,0,Math.PI*2);ctx.fill();
    ctx.globalCompositeOperation='source-over';
    // Core
    ctx.fillStyle=PU_COLORS[pu.type];
    ctx.beginPath();ctx.arc(sx,sy,r,0,Math.PI*2);ctx.fill();
    // Label
    ctx.fillStyle='#0F0C19';
    ctx.font=`bold ${cellSize*0.35|0}px system-ui,sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(PU_LABELS[pu.type],sx,sy);
  }
}

// ===================================================================
// FIRE TRAIL PARTICLES
// ===================================================================
function spawnFireTrail(dt){
  trailTimer+=dt;
  const rate=0.025;
  const spread=player.size/40;
  while(trailTimer>=rate){
    trailTimer-=rate;
    if(player.size<2)continue;
    spawnP(
      player.x+(Math.random()-0.5)*spread,
      player.y+(Math.random()-0.5)*spread,
      (Math.random()-0.5)*1+player.vx*0.1,
      -1.5-Math.random()*2,
      0.4+Math.random()*0.4,0,
      1,0.35+Math.random()*0.45,0
    );
  }
}

// ===================================================================
// INPUT
// ===================================================================
function setupInput(){
  window.addEventListener('keydown',e=>{
    keys[e.code]=true;
    if(gameState===GS_TITLE){initAudio();startHowTo();e.preventDefault();return}
    if(gameState===GS_HOWTO){startLevelSelect();e.preventDefault();return}
    if(gameState===GS_OVER&&e.code==='Space'){initAudio();startLevelSelect();e.preventDefault();return}
    e.preventDefault();
  });
  window.addEventListener('keyup',e=>{keys[e.code]=false});

  canvas.addEventListener('mousedown',e=>{
    initAudio();
    mouseClicked=true;
    mouseX=e.clientX;mouseY=e.clientY;
  });
  canvas.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY});

  canvas.addEventListener('touchstart',e=>{
    e.preventDefault();initAudio();
    for(const touch of e.changedTouches){
      if(gameState!==GS_PLAYING){
        mouseClicked=true;mouseX=touch.clientX;mouseY=touch.clientY;
        return;
      }
      // Left half = joystick
      if(touch.clientX<W*0.5){
        touchJoy={baseX:touch.clientX,baseY:touch.clientY,
          knobX:touch.clientX,knobY:touch.clientY,id:touch.identifier};
      }else{
        mouseClicked=true;mouseX=touch.clientX;mouseY=touch.clientY;
      }
    }
  },{passive:false});

  canvas.addEventListener('touchmove',e=>{
    e.preventDefault();
    for(const touch of e.changedTouches){
      if(touchJoy&&touch.identifier===touchJoy.id){
        touchJoy.knobX=touch.clientX;
        touchJoy.knobY=touch.clientY;
      }
    }
  },{passive:false});

  canvas.addEventListener('touchend',e=>{
    e.preventDefault();
    for(const touch of e.changedTouches){
      if(touchJoy&&touch.identifier===touchJoy.id){
        touchJoy=null;
      }
    }
  },{passive:false});

  canvas.addEventListener('touchcancel',e=>{
    e.preventDefault();
    touchJoy=null;
  },{passive:false});
}

function processInput(){
  inputX=0;inputY=0;
  // Keyboard
  if(keys['ArrowLeft']||keys['KeyA'])inputX-=1;
  if(keys['ArrowRight']||keys['KeyD'])inputX+=1;
  if(keys['ArrowUp']||keys['KeyW'])inputY-=1;
  if(keys['ArrowDown']||keys['KeyS'])inputY+=1;
  // Normalize diagonal
  if(inputX!==0&&inputY!==0){inputX*=0.707;inputY*=0.707}
  // Touch joystick
  if(touchJoy){
    const dx=touchJoy.knobX-touchJoy.baseX;
    const dy=touchJoy.knobY-touchJoy.baseY;
    const d=Math.hypot(dx,dy);
    const maxR=60;
    if(d>5){
      const f=Math.min(d,maxR)/maxR;
      inputX=dx/d*f;
      inputY=dy/d*f;
    }
  }
}

// ===================================================================
// GAME STATE MACHINE
// ===================================================================
function startHowTo(){
  gameState=GS_HOWTO;
  pCount=0;
  clickTargets=[];
}

function startLevelSelect(){
  gameState=GS_SELECT;
  pCount=0;
  clickTargets=[];
}

function startLevelIntro(li){
  currentLevel=li;
  gameState=GS_INTRO;
  introTimer=3.5;
  introText=LEVELS[li].flavor;
  pCount=0;
}

function startLevel(li){
  const cfg=LEVELS[li];
  gameState=GS_PLAYING;
  currentLevel=li;
  generateGrid(li);
  resetPlayer(cfg);
  initClouds(cfg);
  initWindZones(cfg);
  initPowerUps();
  score=0;combo=0;
  levelTimer=cfg.duration;
  shieldTimer=0;
  activePowerUp=-1;
  activePowerUpTimer=0;
  pCount=0;
  floats=[];
  screenShake=0;
  flashAlpha=0;
  trailTimer=0;
}

function completeLevel(){
  gameState=GS_COMPLETE;
  // Time bonus
  const timeBonus=Math.round(levelTimer*10);
  score+=timeBonus;
  // Save
  if(score>levelBest[currentLevel])levelBest[currentLevel]=score;
  if(currentLevel>=unlockedLevel&&currentLevel<4)unlockedLevel=currentLevel+1;
  saveData();
  sfxComplete();
  clickTargets=[];
}

function gameOver(){
  gameState=GS_OVER;
  if(score>levelBest[currentLevel])levelBest[currentLevel]=score;
  saveData();
  sfxGameOver();
  clickTargets=[];
}

function getGrade(li,s){
  const cfg=LEVELS[li];
  if(s>=cfg.gold)return'GOLD';
  if(s>=cfg.silver)return'SILVER';
  if(s>=cfg.bronze)return'BRONZE';
  return'';
}

function getGradeColor(g){
  if(g==='GOLD')return'#FFD166';
  if(g==='SILVER')return'#C0C0C0';
  if(g==='BRONZE')return'#CD7F32';
  return'#666';
}

// ===================================================================
// SAVE / LOAD
// ===================================================================
function saveData(){
  try{
    localStorage.setItem('ember_best',JSON.stringify(levelBest));
    localStorage.setItem('ember_unlock',''+unlockedLevel);
  }catch(e){}
}

function loadData(){
  try{
    const b=localStorage.getItem('ember_best');
    if(b)levelBest=JSON.parse(b);
    const u=localStorage.getItem('ember_unlock');
    if(u)unlockedLevel=parseInt(u)||0;
  }catch(e){}
}

// ===================================================================
// CANVAS RESIZE
// ===================================================================
function resize(){
  const dpr=window.devicePixelRatio||1;
  W=window.innerWidth;H=window.innerHeight;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  calcGridLayout();
}

function calcGridLayout(){
  const mt=55,mb=55,ms=15;
  const aw=W-ms*2,ah=H-mt-mb;
  cellSize=Math.floor(Math.min(aw/GRID_W,ah/GRID_H));
  if(cellSize<4)cellSize=4;
  gridX=Math.floor((W-cellSize*GRID_W)/2);
  gridY=Math.floor(mt+(ah-cellSize*GRID_H)/2);
}

// ===================================================================
// RENDERING — BACKGROUND
// ===================================================================
function renderBg(){
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#1B1145');
  grad.addColorStop(1,'#E8845C');
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,W,H);
}

// ===================================================================
// RENDERING — GRID
// ===================================================================
function renderGrid(t){
  const gap=cellSize>8?1:0;
  const ds=cellSize-gap;
  for(let y=0;y<GRID_H;y++){
    for(let x=0;x<GRID_W;x++){
      const idx=y*GRID_W+x;
      const col=getCellColor(idx,t);
      ctx.fillStyle=colStr(col);
      ctx.fillRect(gridX+x*cellSize,gridY+y*cellSize,ds,ds);
      // Burning glow
      if(cellState[idx]===S_BURNING){
        const fl=noise(idx,0,t*8);
        ctx.fillStyle=`rgba(255,100,0,${0.06+fl*0.06})`;
        ctx.fillRect(gridX+x*cellSize-1,gridY+y*cellSize-1,cellSize+2,cellSize+2);
      }
    }
  }
}

// ===================================================================
// RENDERING — PLAYER
// ===================================================================
function renderPlayer(t){
  const sx=p2sx(),sy=p2sy();
  const r=clamp(player.size*0.6,3,25);
  const screenR=r*(cellSize/16);

  // Shield aura
  if(shieldTimer>0){
    ctx.strokeStyle=`rgba(102,255,204,${0.3+Math.sin(t*8)*0.15})`;
    ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(sx,sy,screenR*2,0,Math.PI*2);ctx.stroke();
  }

  // Glow
  ctx.globalCompositeOperation='lighter';
  const grad=ctx.createRadialGradient(sx,sy,0,sx,sy,screenR*2.5);
  grad.addColorStop(0,'rgba(255,107,53,0.25)');
  grad.addColorStop(0.5,'rgba(255,107,53,0.08)');
  grad.addColorStop(1,'rgba(255,107,53,0)');
  ctx.fillStyle=grad;
  ctx.beginPath();ctx.arc(sx,sy,screenR*2.5,0,Math.PI*2);ctx.fill();
  ctx.globalCompositeOperation='source-over';

  // Outer flame (wobbly)
  ctx.fillStyle='#E84040';
  ctx.beginPath();
  for(let i=0;i<10;i++){
    const a=(i/10)*Math.PI*2;
    const wobble=1+Math.sin(t*12+i*2.5)*0.18;
    const fx=sx+Math.cos(a)*screenR*wobble;
    const fy=sy+Math.sin(a)*screenR*wobble;
    i===0?ctx.moveTo(fx,fy):ctx.lineTo(fx,fy);
  }
  ctx.closePath();ctx.fill();

  // Mid
  ctx.fillStyle='#FF8C42';
  ctx.beginPath();
  for(let i=0;i<8;i++){
    const a=(i/8)*Math.PI*2;
    const wobble=1+Math.sin(t*15+i*3)*0.15;
    const fx=sx+Math.cos(a)*screenR*0.65*wobble;
    const fy=sy+Math.sin(a)*screenR*0.65*wobble;
    i===0?ctx.moveTo(fx,fy):ctx.lineTo(fx,fy);
  }
  ctx.closePath();ctx.fill();

  // Core
  ctx.fillStyle='#FFE066';
  ctx.beginPath();
  ctx.arc(sx,sy,screenR*0.3,0,Math.PI*2);
  ctx.fill();
}

// ===================================================================
// RENDERING — HUD (during gameplay)
// ===================================================================
function renderHUD(t){
  // Score — top left
  ctx.font='bold 22px system-ui,sans-serif';
  ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillStyle='#FFD166';
  ctx.fillText('SCORE: '+score,15,12);

  // Combo
  if(combo>=5){
    const cm=getComboMult();
    ctx.font='bold 16px system-ui,sans-serif';
    ctx.fillStyle='#FF8C42';
    ctx.fillText(cm+'x COMBO ('+combo+')',15,38);
  }

  // Timer — top right
  const mins=Math.floor(levelTimer/60);
  const secs=Math.floor(levelTimer%60);
  const timeStr=mins+':'+(secs<10?'0':'')+secs;
  ctx.font='bold 22px system-ui,sans-serif';
  ctx.textAlign='right';ctx.textBaseline='top';
  ctx.fillStyle=levelTimer<10?'#FF4444':'#E8E4DC';
  ctx.fillText(timeStr,W-15,12);

  // Level name
  ctx.font='13px system-ui,sans-serif';
  ctx.fillStyle='rgba(232,228,220,0.5)';
  ctx.fillText(LEVELS[currentLevel].name,W-15,38);

  // Size bar — bottom center
  const barW=200,barH=12;
  const barX=(W-barW)/2,barY=H-35;
  const sizeFrac=clamp(player.size/P_MAX,0,1);
  // Background
  ctx.fillStyle='rgba(15,12,25,0.6)';
  ctx.fillRect(barX-2,barY-2,barW+4,barH+4);
  // Fill
  const barColor=player.size<6?'#E84040':player.size<15?'#FF8C42':'#FFD166';
  ctx.fillStyle=barColor;
  ctx.fillRect(barX,barY,barW*sizeFrac,barH);
  // Border
  ctx.strokeStyle='rgba(232,228,220,0.3)';
  ctx.lineWidth=1;
  ctx.strokeRect(barX-1,barY-1,barW+2,barH+2);
  // Label
  ctx.font='bold 10px system-ui,sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='#E8E4DC';
  ctx.fillText('FIRE SIZE: '+Math.round(player.size),W/2,barY+barH/2);

  // Shield indicator
  if(shieldTimer>0){
    ctx.font='bold 14px system-ui,sans-serif';
    ctx.textAlign='center';ctx.textBaseline='bottom';
    ctx.fillStyle='#66FFCC';
    ctx.fillText('SHIELD: '+shieldTimer.toFixed(1)+'s',W/2,barY-8);
  }

  // Touch joystick
  if(touchJoy){
    ctx.strokeStyle='rgba(232,228,220,0.25)';
    ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(touchJoy.baseX,touchJoy.baseY,60,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='rgba(232,228,220,0.3)';
    const dx=touchJoy.knobX-touchJoy.baseX,dy=touchJoy.knobY-touchJoy.baseY;
    const d=Math.min(Math.hypot(dx,dy),60);
    const a=Math.atan2(dy,dx);
    const kx=touchJoy.baseX+Math.cos(a)*d,ky=touchJoy.baseY+Math.sin(a)*d;
    ctx.beginPath();ctx.arc(kx,ky,20,0,Math.PI*2);ctx.fill();
  }
}

// ===================================================================
// RENDERING — HOW TO PLAY
// ===================================================================
function renderHowTo(t){
  renderBg();

  // Card background
  const cardW=Math.min(W*0.85,520);
  const cardH=Math.min(H*0.82,440);
  const cx=(W-cardW)/2,cy=(H-cardH)/2;
  ctx.fillStyle='rgba(15,12,25,0.88)';
  ctx.fillRect(cx,cy,cardW,cardH);
  ctx.strokeStyle='rgba(255,209,102,0.15)';
  ctx.lineWidth=1;
  ctx.strokeRect(cx,cy,cardW,cardH);

  // Title
  ctx.font='bold '+Math.min(cardW*0.07,28)+'px system-ui,sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='#FFD166';
  ctx.fillText('HOW TO PLAY',W/2,cy+32);

  // Subtitle
  ctx.font=Math.min(cardW*0.035,14)+'px system-ui,sans-serif';
  ctx.fillStyle='rgba(232,228,220,0.5)';
  ctx.fillText('You are a wildfire. Eat dry fuel. Avoid rain. Grow huge.',W/2,cy+58);

  // Icon rows
  const items=[
    {icon:'move',color:'#E8E4DC',label:'MOVE',desc:'Arrow Keys / WASD / Touch Joystick'},
    {icon:'dry',color:'#D4A055',label:'DRY TERRAIN',desc:'Eat brown cells to GROW bigger'},
    {icon:'wet',color:'#5B8C5A',label:'WET TERRAIN',desc:'Green cells SHRINK you \u2014 avoid!'},
    {icon:'cloud',color:'#AAB4C8',label:'RAIN CLOUDS',desc:'Gray puffs with falling rain \u2014 dodge!'},
    {icon:'wind',color:'#C8C8E0',label:'WIND GUSTS',desc:'Light streaky zones \u2014 ride the boost!'},
    {icon:'power',color:'#FFD166',label:'POWER-UPS',desc:'Glowing circles with letters \u2014 grab them!'},
    {icon:'size',color:'#E84040',label:'SIZE = 0?',desc:'Your flame dies. Game over!'},
  ];

  const rowH=Math.min((cardH-120)/items.length,44);
  const startY=cy+80;
  const iconX=cx+40;
  const labelX=cx+80;
  const descX=cx+cardW*0.42;

  for(let i=0;i<items.length;i++){
    const it=items[i];
    const ry=startY+i*rowH;
    const iconSz=Math.min(rowH*0.6,24);

    // Draw icon
    switch(it.icon){
      case 'move':{
        // Arrow cross
        const s=iconSz*0.35;
        ctx.fillStyle=it.color;
        ctx.fillRect(iconX-s,ry-s*3,s*2,s*2); // up
        ctx.fillRect(iconX-s,ry+s,s*2,s*2); // down
        ctx.fillRect(iconX-s*3,ry-s,s*2,s*2); // left
        ctx.fillRect(iconX+s,ry-s,s*2,s*2); // right
        ctx.fillRect(iconX-s,ry-s,s*2,s*2); // center
        break;
      }
      case 'dry':{
        ctx.fillStyle=it.color;
        ctx.fillRect(iconX-iconSz/2,ry-iconSz/2,iconSz,iconSz);
        break;
      }
      case 'wet':{
        ctx.fillStyle=it.color;
        ctx.fillRect(iconX-iconSz/2,ry-iconSz/2,iconSz,iconSz);
        break;
      }
      case 'cloud':{
        ctx.fillStyle='rgba(170,180,200,0.7)';
        ctx.beginPath();ctx.arc(iconX,ry-3,iconSz*0.35,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(iconX-iconSz*0.25,ry+2,iconSz*0.25,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(iconX+iconSz*0.25,ry+2,iconSz*0.28,0,Math.PI*2);ctx.fill();
        // Rain drops
        ctx.fillStyle='rgba(100,150,220,0.6)';
        ctx.fillRect(iconX-5,ry+iconSz*0.35,1.5,5);
        ctx.fillRect(iconX+3,ry+iconSz*0.4,1.5,4);
        ctx.fillRect(iconX-1,ry+iconSz*0.5,1.5,4);
        break;
      }
      case 'wind':{
        ctx.strokeStyle='rgba(200,200,230,0.6)';
        ctx.lineWidth=2;
        for(let j=0;j<3;j++){
          const ly=ry-6+j*6;
          ctx.beginPath();
          ctx.moveTo(iconX-iconSz*0.4,ly);
          ctx.lineTo(iconX+iconSz*0.4,ly-2);
          ctx.stroke();
        }
        // Arrow tip
        ctx.fillStyle='rgba(200,200,230,0.5)';
        ctx.beginPath();
        ctx.moveTo(iconX+iconSz*0.45,ry-2);
        ctx.lineTo(iconX+iconSz*0.3,ry-7);
        ctx.lineTo(iconX+iconSz*0.3,ry+3);
        ctx.closePath();ctx.fill();
        break;
      }
      case 'power':{
        const pulse=1+Math.sin(t*5)*0.15;
        ctx.fillStyle=it.color;
        ctx.beginPath();ctx.arc(iconX,ry,iconSz*0.35*pulse,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#0F0C19';
        ctx.font=`bold ${iconSz*0.4|0}px system-ui,sans-serif`;
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText('D',iconX,ry);
        break;
      }
      case 'size':{
        // Tiny flame dying
        ctx.fillStyle='#E84040';
        ctx.beginPath();ctx.arc(iconX,ry,iconSz*0.2,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#FF8C42';
        ctx.beginPath();ctx.arc(iconX,ry,iconSz*0.1,0,Math.PI*2);ctx.fill();
        // X mark
        ctx.strokeStyle='#E84040';ctx.lineWidth=2;
        ctx.beginPath();
        ctx.moveTo(iconX-iconSz*0.35,ry-iconSz*0.35);
        ctx.lineTo(iconX+iconSz*0.35,ry+iconSz*0.35);
        ctx.moveTo(iconX+iconSz*0.35,ry-iconSz*0.35);
        ctx.lineTo(iconX-iconSz*0.35,ry+iconSz*0.35);
        ctx.stroke();
        break;
      }
    }

    // Label
    ctx.font='bold '+Math.min(cardW*0.035,15)+'px system-ui,sans-serif';
    ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillStyle=it.color;
    ctx.fillText(it.label,labelX,ry);

    // Description
    ctx.font=Math.min(cardW*0.03,13)+'px system-ui,sans-serif';
    ctx.fillStyle='rgba(232,228,220,0.6)';
    ctx.fillText(it.desc,descX,ry);
  }

  // "GOT IT" button
  clickTargets=[];
  const btnW=180,btnH=44;
  const btnX=(W-btnW)/2;
  const btnY=cy+cardH-55;
  const hoverPulse=0.85+Math.sin(t*3)*0.15;
  ctx.fillStyle=`rgba(255,140,66,${hoverPulse})`;
  ctx.fillRect(btnX,btnY,btnW,btnH);
  ctx.font='bold 16px system-ui,sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='#0F0C19';
  ctx.fillText('GOT IT \u2014 LET\'S GO!',btnX+btnW/2,btnY+btnH/2);
  clickTargets.push({x:btnX,y:btnY,w:btnW,h:btnH,action:()=>startLevelSelect()});
}

// ===================================================================
// RENDERING — LEVEL SELECT
// ===================================================================
function renderLevelSelect(t){
  renderBg();

  ctx.font='bold '+Math.min(W*0.06,36)+'px system-ui,sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='#FFD166';
  ctx.fillText('SELECT LEVEL',W/2,50);

  clickTargets=[];
  const cardW=Math.min(W*0.7,500);
  const cardH=60;
  const gap=12;
  const startY=100;

  for(let i=0;i<5;i++){
    const cfg=LEVELS[i];
    const locked=i>unlockedLevel;
    const cx=(W-cardW)/2;
    const cy=startY+i*(cardH+gap);
    const best=levelBest[i];
    const grade=getGrade(i,best);

    // Card background
    ctx.fillStyle=locked?'rgba(30,25,45,0.7)':'rgba(30,25,45,0.85)';
    ctx.fillRect(cx,cy,cardW,cardH);
    ctx.strokeStyle=locked?'rgba(100,100,120,0.2)':grade?getGradeColor(grade):'rgba(232,228,220,0.15)';
    ctx.lineWidth=1.5;
    ctx.strokeRect(cx,cy,cardW,cardH);

    // Number
    ctx.font='bold 24px system-ui,sans-serif';
    ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillStyle=locked?'rgba(100,100,120,0.4)':'#FF8C42';
    ctx.fillText(''+(i+1),cx+15,cy+cardH/2);

    // Name
    ctx.font='bold 16px system-ui,sans-serif';
    ctx.fillStyle=locked?'rgba(100,100,120,0.4)':'#E8E4DC';
    ctx.fillText(cfg.name,cx+50,cy+cardH/2-8);
    ctx.font='12px system-ui,sans-serif';
    ctx.fillStyle=locked?'rgba(100,100,120,0.3)':'rgba(232,228,220,0.5)';
    ctx.fillText(cfg.sub,cx+50,cy+cardH/2+10);

    if(locked){
      ctx.font='bold 14px system-ui,sans-serif';
      ctx.textAlign='right';
      ctx.fillStyle='rgba(100,100,120,0.4)';
      ctx.fillText('LOCKED',cx+cardW-15,cy+cardH/2);
    }else{
      // Best score + grade
      ctx.textAlign='right';
      if(best>0){
        ctx.font='bold 14px system-ui,sans-serif';
        ctx.fillStyle='#FFD166';
        ctx.fillText(''+best,cx+cardW-15,cy+cardH/2-8);
        if(grade){
          ctx.font='bold 11px system-ui,sans-serif';
          ctx.fillStyle=getGradeColor(grade);
          ctx.fillText(grade,cx+cardW-15,cy+cardH/2+10);
        }
      }else{
        ctx.font='13px system-ui,sans-serif';
        ctx.fillStyle='rgba(232,228,220,0.3)';
        ctx.fillText('NEW',cx+cardW-15,cy+cardH/2);
      }
      // Click target
      clickTargets.push({x:cx,y:cy,w:cardW,h:cardH,action:()=>startLevelIntro(i)});
    }
  }

  // Instructions
  ctx.font='12px system-ui,sans-serif';
  ctx.textAlign='center';
  ctx.fillStyle='rgba(232,228,220,0.3)';
  ctx.fillText('Click or tap a level to play',W/2,startY+5*(cardH+gap)+15);
}

// ===================================================================

// ===================================================================
function renderPlaying(t){
  renderBg();

  // Screen shake offset
  let shX=0,shY=0;
  if(screenShake>0.1){
    shX=(Math.random()-0.5)*screenShake*6;
    shY=(Math.random()-0.5)*screenShake*6;
  }
  ctx.save();
  ctx.translate(shX,shY);

  renderGrid(t);
  renderWindZones(t);
  renderPowerUps(t);
  renderParticles();
  renderPlayer(t);
  renderClouds(t);

  ctx.restore();

  renderHUD(t);

  // Flash
  if(flashAlpha>0.01){
    ctx.fillStyle=flashColor+flashAlpha.toFixed(2)+')';
    ctx.fillRect(0,0,W,H);

}

// ===================================================================
// CLICK HANDLING
// ===================================================================
function handleClick(mx,my){
  for(const t of clickTargets){
    if(mx>=t.x&&mx<t.x+t.w&&my>=t.y&&my<t.y+t.h){
      t.action();
      return true;
    }
  }
  return false;
}

// ===================================================================
// UPDATE
// ===================================================================
function update(dt){
  switch(gameState){
    case GS_TITLE:
      updateTitle(dt);
      if(mouseClicked){mouseClicked=false;initAudio();startHowTo()}
      break;
    case GS_HOWTO:
      if(mouseClicked){mouseClicked=false;handleClick(mouseX,mouseY)}
      break;
    case GS_SELECT:
      if(mouseClicked){mouseClicked=false;handleClick(mouseX,mouseY)}
      break;
    case GS_INTRO:
      introTimer-=dt;
      if(introTimer<=0)startLevel(currentLevel);
      break;
    case GS_PLAYING:
      updatePlaying(dt);
      break;
    case GS_COMPLETE:
      if(mouseClicked){mouseClicked=false;handleClick(mouseX,mouseY)}
      break;
    case GS_OVER:
      if(mouseClicked){mouseClicked=false;handleClick(mouseX,mouseY)}
      break;
  }
}

function updateTitle(dt){
  titleTime+=dt;
  // Ambient fire particles from bottom
  if(Math.random()<dt*12){
    spawnP(
      Math.random()*GRID_W,GRID_H+1,
      (Math.random()-0.5)*0.3,-2-Math.random()*3,
      1+Math.random()*1.5,0,
      1,0.3+Math.random()*0.4,0
    );
  }
  updateParticles(dt);
}

function updatePlaying(dt){
  processInput();

  levelTimer-=dt;
  if(levelTimer<=0){levelTimer=0;completeLevel();return}

  updatePlayer(dt);
  handleWindZones(dt);
  handleGridCollision(dt);
  updateClouds(dt);
  updatePowerUps(dt);
  updateGrid(dt);
  spawnFireTrail(dt);
  spawnWindParticles(dt);
  updateParticles(dt);
  updateFloats(dt);

  // Clamp size
  player.size=clamp(player.size,P_MIN,P_MAX);

  // Shield decay
  if(shieldTimer>0)shieldTimer-=dt;

  // Screen shake decay
  if(screenShake>0){screenShake*=0.92;if(screenShake<0.05)screenShake=0}

  // Flash decay
  if(flashAlpha>0){flashAlpha-=dt*2;if(flashAlpha<0)flashAlpha=0}

  // Game over check
  if(player.size<=0){player.size=0;gameOver()}
}

// ===================================================================
// RENDER (dispatcher)
// ===================================================================
function render(t){
  ctx.clearRect(0,0,W,H);
  switch(gameState){
    case GS_TITLE:renderTitle(t);break;
    case GS_HOWTO:renderHowTo(t);break;
    case GS_SELECT:renderLevelSelect(t);break;
    case GS_INTRO:renderLevelIntro(t);break;
    case GS_PLAYING:renderPlaying(t);break;
    case GS_COMPLETE:renderLevelComplete(t);break;
    case GS_OVER:renderGameOver(t);break;
  }
}

// ===================================================================
// GAME LOOP
// ===================================================================
let lastTime=0;
function loop(now){
  if(!lastTime){lastTime=now;requestAnimationFrame(loop);return}
  const dt=Math.min((now-lastTime)/1000,0.1);
  lastTime=now;
  update(dt);
  render(now/1000);
  requestAnimationFrame(loop);
}

// Handle visibility change (pause when hidden)
document.addEventListener('visibilitychange',()=>{if(document.hidden)lastTime=0});

// ===================================================================
// INIT
// ===================================================================
function init(){
  initGridArrays();
  loadData();
  setupInput();
  resize();
  window.addEventListener('resize',resize);
  requestAnimationFrame(loop);
}

init();
</script>
